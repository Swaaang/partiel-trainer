   o:["Une licence d'utilisation temporaire accordée à l'éditeur pour une durée déterminée","Une cession de droits d'auteur, par laquelle elle transfère définitivement et contractuellement ses droits patrimoniaux à l'éditeur","Un mandat de gestion des droits confié à l'éditeur en tant que représentant","Un contrat de commande donnant à l'éditeur la propriété des illustrations commandées"],
   a:1,e:"La cession de droits d'auteur est un transfert DÉFINITIF des droits patrimoniaux de l'auteur à un cessionnaire, contre rémunération. Elle doit obligatoirement être écrite et préciser les droits cédés, la durée, le territoire, les modes d'exploitation et la rémunération. À distinguer de la licence, qui n'est qu'une autorisation temporaire."},

  {id:132,t:"ct",d:"f",
   q:"Un photographe autorise un magazine à publier ses photos pour une durée de 2 ans, sur support papier uniquement, en conservant tous ses droits d'auteur. De quel contrat s'agit-il et quelle en est la caractéristique essentielle ?",
   o:["Une cession de droits : le magazine acquiert définitivement tous les droits sur les photos","Une licence d'utilisation : le photographe accorde une autorisation d'exploiter son oeuvre dans des conditions précises, sans transfert de la propriété de ses droits","Un contrat de commande photographique avec droit de cession implicite","Un contrat de prestation de services standard sans spécificité en matière de droits d'auteur"],
   a:1,e:"La licence d'utilisation est une autorisation d'exploiter une oeuvre selon des conditions précisément définies (durée, territoire, support, mode d'exploitation). L'auteur reste propriétaire de ses droits d'auteur. C'est une autorisation, pas un transfert de propriété — contrairement à la cession."},

  {id:133,t:"ct",d:"m",
   q:"Un designer freelance et son client concluent oralement un accord sur la cession de droits d'utilisation d'une identité visuelle. Cet accord verbal est-il juridiquement valide en droit français ?",
   o:["Oui, un accord oral est aussi valable qu'un contrat écrit et produit les mêmes effets juridiques","Non, la cession de droits d'auteur doit obligatoirement être formalisée par écrit et préciser les droits cédés, la durée, le territoire, le mode d'exploitation et la rémunération","Non, mais il peut être régularisé ultérieurement par un simple email de confirmation","Oui, si le montant de la cession est inférieur à 1 500 €"],
   a:1,e:"L'article L131-3 du Code de la Propriété Intellectuelle impose que la cession des droits d'auteur soit écrite et précise : (1) les droits cédés, (2) la durée, (3) le territoire, (4) le mode d'exploitation autorisé, (5) la rémunération. Toute mention absente signifie que le droit correspondant n'est pas cédé et reste chez l'auteur."},

  {id:134,t:"ct",d:"m",
   q:"Un illustrateur signe un contrat de cession qui ne précise ni la durée de la cession ni les territoires couverts. Le client prétend que l'absence de ces précisions lui confère une liberté totale d'utilisation. Cette interprétation est-elle correcte ?",
   o:["Oui, une cession sans restriction de durée et de territoire vaut cession mondiale et perpétuelle","Non, en vertu du principe de spécialité : les droits non expressément cédés restent chez l'auteur, et les ambiguïtés du contrat s'interprètent en faveur de l'auteur","Oui, les usages professionnels comblent les lacunes contractuelles dans le secteur créatif","Non, mais le client peut invoquer la bonne foi pour justifier un usage étendu"],
   a:1,e:"Le principe de spécialité (art. L131-3 CPI) est protecteur de l'auteur : toute clause imprécise ou lacunaire s'interprète en faveur de l'auteur. Un droit non expressément mentionné dans le contrat est réputé non cédé. L'absence de durée et de territoire ne vaut pas cession mondiale et perpétuelle."},

  {id:135,t:"ct",d:"m",
   q:"Un graphiste a créé une affiche pour la campagne de communication d'un restaurant en 2023. En 2025, le restaurant souhaite réutiliser cette affiche pour l'ouverture d'un second restaurant. Peut-il le faire sans contacter le graphiste, en invoquant qu'il a déjà payé pour la création ?",
   o:["Oui, dès lors qu'il a payé intégralement la prestation initiale, le client peut réutiliser l'oeuvre à sa guise","Non, le paiement de la commande n'emporte pas cession automatique des droits. Seul l'usage prévu initialement est autorisé — tout autre usage requiert une nouvelle autorisation et une nouvelle rémunération","Oui, si l'usage est similaire (communication du même restaurant) et sans modification de l'oeuvre","Non, mais un usage ponctuel supplémentaire peut être toléré en dehors de tout contrat"],
   a:1,e:"Principe fondamental : le paiement d'une commande créative ne transfère PAS automatiquement les droits d'auteur. Le client ne dispose que d'une licence implicite pour l'usage initialement prévu. Pour tout usage supplémentaire (nouveau restaurant, autre support, autre durée), une nouvelle autorisation contractuelle et une rémunération complémentaire sont nécessaires."},

  {id:136,t:"ct",d:"h",
   q:"Une entreprise de cosmétiques commande à un photographe indépendant une série de photos pour son catalogue. Elle finance entièrement la production (studio, matériel, post-production) et lui verse ses honoraires. L'entreprise affirme être propriétaire des droits sur les photos car elle a tout financé. Cette affirmation est-elle juridiquement fondée en France ?",
   o:["Oui, le financement intégral de la production transfère automatiquement la propriété des droits d'auteur au donneur d'ordre","Non, en droit français, l'auteur freelance conserve ses droits d'auteur quels que soient le financement et les instructions reçus. Le paiement ≠ transfert de droits — seul un contrat de cession écrit peut opérer ce transfert","Oui, si la commande dépasse 1 000 € et que le photographe a suivi des instructions précises","Cela dépend de la nature du contrat : un contrat de services implique une cession, un contrat d'oeuvre de commande non"],
   a:1,e:"C'est l'un des pièges les plus fréquents dans les relations créateurs/clients. En France, le financement d'une oeuvre NE transfère PAS les droits d'auteur. Le photographe freelance reste automatiquement auteur et titulaire de ses droits patrimoniaux. Seul un contrat de CESSION EXPRESSE ET ÉCRIT peut transférer ces droits. Cette règle protège les créateurs indépendants."},

  {id:137,t:"ct",d:"h",
   q:"Un designer freelance signe un contrat de cession de droits pour la création d'un logotype. Pour être valide et complet selon le Code de la Propriété Intellectuelle, quels éléments ce contrat doit-il impérativement préciser ?",
   o:["Uniquement le prix et la date de livraison de la création finale","Les droits précisément cédés, la durée de la cession, le territoire géographique couvert, la destination (usages autorisés) et la rémunération proportionnelle ou forfaitaire","Le nom complet de l'auteur, sa date de naissance et son numéro SIRET","Le numéro SIRET des deux parties contractantes et le délai de paiement uniquement"],
   a:1,e:"Art. L131-3 CPI : la cession doit préciser à peine de nullité (1) les droits cédés, (2) la durée, (3) le territoire géographique, (4) la destination/usage autorisé et (5) la rémunération (proportionnelle aux recettes en principe, forfait possible dans des cas limitatifs). Toute mention absente = droit non cédé."},

  {id:138,t:"cf",d:"f",
   q:"Un concurrent reproduit sur son site internet les visuels du catalogue d'une agence de design sans aucune autorisation. Une marque de streetwear copie à l'identique le logo déposé d'une autre marque. Ces deux situations constituent chacune une infraction. Comment se nomme cette infraction ?",
   o:["La concurrence déloyale, sanctionnée uniquement par des dommages et intérêts civils","La contrefaçon : toute atteinte à un droit de propriété intellectuelle par reproduction ou exploitation non autorisée d'une oeuvre, marque, brevet ou dessin protégé","La concurrence parasitaire, qui suppose une volonté de profiter de la réputation d'autrui","Le plagiat, terme équivalent à la contrefaçon dans le domaine créatif"],
   a:1,e:"La contrefaçon (terme juridique) couvre toute violation d'un droit de propriété intellectuelle : reproduction non autorisée d'une oeuvre protégée (droit d'auteur), imitation d'une marque déposée, exploitation non autorisée d'un brevet ou dessin/modèle enregistré. C'est à la fois une infraction civile et pénale."},

  {id:139,t:"cf",d:"m",
   q:"Un studio de design apprend que l'un de ses logos phares a été massivement copié et commercialisé sans autorisation. Quelle sanction pénale maximale le contrefacteur risque-t-il en France pour un tel acte ?",
   o:["1 an d'emprisonnement et 100 000 € d'amende au maximum","3 ans d'emprisonnement et 300 000 € d'amende (art. L335-2 CPI) — peines pouvant être aggravées à 5 ans et 500 000 € en cas de circonstances aggravantes","10 ans d'emprisonnement et 1 million € d'amende","5 ans d'emprisonnement et 500 000 € d'amende dans tous les cas"],
   a:1,e:"La contrefaçon est un délit pénal sanctionné de 3 ans d'emprisonnement et 300 000 € d'amende. Des peines aggravées (5 ans et 500 000 €) s'appliquent en cas de circonstances aggravantes : bande organisée, délinquance en récidive, utilisation d'Internet, travail dissimulé ou livraison à des mineurs."},

  {id:140,t:"cf",d:"m",
   q:"Un créateur graphique s'inspire fortement du style visuel caractéristique d'un artiste reconnu (palette de couleurs, composition, traitement typographique) mais ne reproduit aucune oeuvre concrète à l'identique. Commet-il une contrefaçon ?",
   o:["Oui, s'inspirer du style artistique d'un auteur constitue systématiquement une contrefaçon","Non, le style, la manière et les influences artistiques ne sont pas protégés par le droit d'auteur. Seule la reproduction d'éléments originaux et concrets d'une oeuvre peut constituer une contrefaçon","Oui, si les deux créateurs opèrent dans le même secteur professionnel","Non, la liberté de création et d'inspiration est totale et sans limite légale"],
   a:1,e:"Le style artistique, la manière, les influences ou les \"recettes\" créatives ne sont pas protégeables par le droit d'auteur — sinon, aucune école de pensée ni aucun mouvement artistique ne serait possible. Seules les oeuvres concrètes et originales bénéficient de la protection. S'inspirer = légal. Reproduire des éléments formels originaux spécifiques = contrefaçon potentielle."},

  {id:141,t:"cf",d:"m",
   q:"Un jeune designer est accusé d'avoir plagié le travail d'un concurrent. Il affirme avoir créé son design bien avant que le concurrent ne publie le sien. Comment peut-il le prouver et devant quelle instance ?",
   o:["Seul un dépôt officiel à l'INPI antérieur à la création du concurrent fait foi de manière incontestable","La preuve de date de création peut être apportée par tout moyen légal : enveloppe Soleau, constat d'huissier, dépôt horodaté sur une plateforme certifiée, dépôt auprès d'une société d'auteurs (SACD, SCAM)","Seul le témoignage de personnes présentes lors de la création est admis comme preuve","La date de publication sur les réseaux sociaux constitue une preuve juridiquement suffisante"],
   a:1,e:"La preuve de la date de création peut être apportée par tout moyen : enveloppe Soleau (INPI, peu coûteuse), constat d'huissier, dépôt horodaté sur une plateforme certifiée, dépôt auprès d'une société d'auteurs. Le dépôt n'est pas obligatoire pour être protégé, mais crucial pour prouver l'antériorité en cas de litige."},

  {id:142,t:"cf",d:"h",
   q:"Un professeur de design confond régulièrement les termes \"plagiat\" et \"contrefaçon\" dans ses cours. Quelle distinction juridique précise peut-on lui opposer pour corriger cette confusion ?",
   o:["Les deux termes sont rigoureusement synonymes en droit de la propriété intellectuelle et peuvent être utilisés indifféremment","Le plagiat est un concept moral et académique (s'approprier le travail d'autrui sans le citer), tandis que la contrefaçon est le terme juridique désignant la violation d'un droit de PI. Le plagiat d'une oeuvre protégée peut constituer une contrefaçon.","La contrefaçon ne concerne que le droit des marques, le plagiat s'applique uniquement aux oeuvres littéraires et artistiques","Le plagiat est une infraction pénale, la contrefaçon est une faute civile uniquement"],
   a:1,e:"Plagiat = concept moral/académique. Contrefaçon = terme juridique précis. Un plagiat peut constituer une contrefaçon si l'oeuvre plagiée est protégée par un droit de PI. Mais la contrefaçon s'étend au-delà : elle inclut aussi l'imitation de marques, brevets, dessins/modèles — même sans plagiat au sens académique."},

  {id:143,t:"cf",d:"f",
   q:"Un étudiant en communication visuelle souhaite utiliser une photo trouvée sur Google Images pour illustrer un projet scolaire diffusé sur le site de son école. Cette image est-elle librement utilisable ?",
   o:["Oui, toute image accessible sur Internet peut être librement utilisée à des fins éducatives ou non commerciales","Non, les images publiées sur Internet sont protégées par le droit d'auteur dès leur création, sauf si elles sont explicitement placées sous licence libre (Creative Commons, etc.)","Oui, une image est libre de droits si elle n'est pas filigranée ou marquée par son auteur","Oui, pour tout usage non commercial ou scolaire, la loi prévoit une exception générale"],
   a:1,e:"Toute image publiée sur Internet est protégée par le droit d'auteur dès sa création — aucune formalité requise. La trouver sur Google Images ne la rend pas libre de droits. Il faut vérifier la licence associée ou utiliser des sources libres : Unsplash, Pexels, Pixabay, images sous licence Creative Commons."},

  {id:144,t:"cf",d:"h",
   q:"Un studio de design constate qu'un concurrent commercialise des produits qui copient à l'identique son packaging déposé comme dessin et modèle. Avant même d'engager une procédure judiciaire au fond, il veut sécuriser les preuves. Quelle procédure préventive très efficace le droit lui offre-t-il ?",
   o:["Il peut signaler l'infraction à la DGCCRF pour qu'elle effectue un contrôle administratif","La saisie-contrefaçon : procédure civile préventive qui permet au titulaire des droits d'obtenir d'un juge l'autorisation de faire constater et saisir par huissier les preuves de contrefaçon et les produits litigieux, avant tout procès au fond","Il peut saisir directement la police pour une procédure de flagrant délit de contrefaçon","Il peut uniquement envoyer une mise en demeure par lettre recommandée et attendre 30 jours"],
   a:1,e:"La saisie-contrefaçon est une procédure civile puissante et spécifique à la propriété intellectuelle. Sur ordonnance d'un juge (rendue ex parte, sans entendre le défendeur), un huissier peut pénétrer dans les locaux du contrefacteur pour constater l'infraction, saisir les produits contrefaisants et recueillir les preuves. Ces éléments seront ensuite utilisés lors du procès."},

  {id:145,t:"da",d:"m",

function initFavicon(){
  const c=document.createElement("canvas");c.width=c.height=192;const ctx=c.getContext("2d");
  const g=ctx.createLinearGradient(0,0,192,192);g.addColorStop(0,"#4F46E5");g.addColorStop(1,"#7C3AED");
  ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(0,0,192,192,40);ctx.fill();
  ctx.fillStyle="rgba(255,255,255,0.15)";ctx.beginPath();ctx.arc(130,50,70,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="white";ctx.font="bold 96px DM Sans,sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("E",96,100);
  const url=c.toDataURL();
  ["icon","apple-touch-icon","shortcut icon"].forEach(rel=>{const l=document.createElement("link");l.rel=rel;l.href=url;document.head.appendChild(l);});
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function h(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function getLv(xp){return[...LEVELS].reverse().find(l=>xp>=l.min)||LEVELS[0];}
function getNextLv(xp){return LEVELS.find(l=>l.min>xp);}
function pct(n,t){return t>0?Math.round(n/t*100):0;}
function scoreColor(p){return p>=70?"#10B981":p>=50?"#F59E0B":"#EF4444";}
function selectQ(sub,cfg){
  let pool=sub.questions.filter(q=>{if(!cfg.themes.includes(q.t))return false;if(cfg.diff!=="x"&&q.d!==cfg.diff)return false;return true;});
  if(!pool.length)pool=sub.questions.filter(q=>cfg.themes.includes(q.t));
  const sd=D.subs[sub.id]||{seenIds:[],themeStats:{}};
  const scored=pool.map(q=>{const key=sub.themes.find(t=>t.id===q.t)?.label||q.t;const ts=sd.themeStats[key]||{correct:0,total:0};const weak=ts.total>0?1-(ts.correct/ts.total)*0.5:0.8;const fresh=sd.seenIds.includes(q.id)?0.3:1;return{q,score:fresh*weak+Math.random()*0.25};});
  return scored.sort((a,b)=>b.score-a.score).slice(0,cfg.count).map(s=>s.q).sort(()=>Math.random()-.5);
}
function getWeakTheme(){let worst=null,worstPct=1;SUBJECTS.forEach(sub=>{const sd=D.subs[sub.id]||{seenIds:[],themeStats:{}};sub.themes.forEach(t=>{const ts=sd.themeStats[t.label];if(ts&&ts.total>=4){const p=ts.correct/ts.total;if(p<worstPct){worstPct=p;worst={sub,themeId:t.id,label:t.label,pct:Math.round(p*100)};}}});});return worst;}

window.openSubject=function(id){S.sub=SUBJECTS.find(s=>s.id===id);S.cfg={themes:S.sub.themes.map(t=>t.id),diff:"m",count:7};go("subject");};
window.startSession=function(){S.qs=selectQ(S.sub,S.cfg);S.cur=0;S.sel=null;S.rev=false;S.ans=[];go("quiz");};
window.selectAnswer=function(idx){if(S.rev)return;S.sel=idx;S.rev=true;render();};
window.nextQuestion=function(){
  const q=S.qs[S.cur];const ok=S.sel===q.a;S.ans.push({theme:q.t,qid:q.id,correct:ok});
  if(S.cur+1<S.qs.length){const qc=document.getElementById("qcard");if(qc){qc.style.transition="opacity .15s,transform .15s";qc.style.opacity="0";qc.style.transform="translateX(14px)";}setTimeout(()=>{S.cur++;S.sel=null;S.rev=false;render();},170);}
  else{finishSession();}
};
window.toggleTheme=function(tid){const t=S.cfg.themes;if(t.includes(tid)&&t.length>1)S.cfg.themes=t.filter(x=>x!==tid);else if(!t.includes(tid))S.cfg.themes=[...t,tid];render();};
window.setDiff=function(d){S.cfg.diff=d;render();};
window.setCount=function(n){S.cfg.count=n;render();};
window.goHub=function(){go("hub");};
window.goSubject=function(){go("subject");};
window.resetStats=function(){if(confirm("Réinitialiser toutes vos statistiques ?\n\nCette action est irréversible.")){D=JSON.parse(JSON.stringify(DEF));saveData();go("hub");}};
window.quickWeakPoint=function(){const w=getWeakTheme();if(!w)return;S.sub=w.sub;S.cfg={themes:[w.themeId],diff:"x",count:7};S.qs=selectQ(S.sub,S.cfg);S.cur=0;S.sel=null;S.rev=false;S.ans=[];go("quiz");};

function finishSession(){
  const scoreN=S.ans.filter(a=>a.correct).length;
  const xpGained=scoreN*10+(scoreN/S.qs.length>=0.8?50:0);
  const today=new Date().toDateString();const yest=new Date(Date.now()-86400000).toDateString();
  const newStreak=D.lastDate===today?D.streak:D.lastDate===yest?D.streak+1:1;
  const sub=S.sub;const newSubs={...D.subs};const sd={...(newSubs[sub.id]||{seenIds:[],themeStats:{}})};
  const newSeen=[...new Set([...sd.seenIds,...S.qs.map(q=>q.id)])];
  const allIds=sub.questions.filter(q=>S.cfg.themes.includes(q.t)).map(q=>q.id);
  sd.seenIds=allIds.every(id=>newSeen.includes(id))?[]:newSeen;
  const nts={...sd.themeStats};
  S.ans.forEach(a=>{const key=sub.themes.find(t=>t.id===a.theme)?.label||a.theme;if(!nts[key])nts[key]={correct:0,total:0};nts[key].total++;if(a.correct)nts[key].correct++;});
  sd.themeStats=nts;newSubs[sub.id]=sd;
  const session={sub:sub.id,date:new Date().toISOString(),score:scoreN,total:S.qs.length,diff:S.cfg.diff};
  const newSessions=[...D.sessions.slice(-99),session];
  D={...D,xp:D.xp+xpGained,streak:newStreak,lastDate:today,totalSessions:D.totalSessions+1,sessions:newSessions,subs:newSubs};
  const earnedIds=BADGES.filter(b=>!D.badges.includes(b.id)&&b.check(D,newSessions)).map(b=>b.id);
  D.badges=[...D.badges,...earnedIds];
  S.newBadges=BADGES.filter(b=>earnedIds.includes(b.id));S.earned=xpGained;
  saveData();go("results");
}

      ${subCards}
      <!-- Coming soon -->
      <div style="background:var(--surf2);border:1px dashed var(--border);border-radius:18px;padding:18px 20px;opacity:.5;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:44px;height:44px;border-radius:14px;background:var(--surf);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px">➕</div>
          <div><div style="font-size:14px;font-weight:600;color:var(--tm)">Bientôt : Droit des contrats</div><div style="font-size:12px;color:var(--ts)">Nouvelle matière en cours de préparation…</div></div>
        </div>
      </div>

      ${badgesSection}

      ${D.totalSessions>0?`<div style="padding:20px 0 8px;text-align:center"><button onclick="resetStats()" style="font-size:12px;color:var(--ts);background:none;border:none;cursor:pointer;font-family:var(--font);text-decoration:underline">Réinitialiser les statistiques</button></div>`:""}
    </div>
    <div style="height:32px"></div>
  </div>`;
}

function renderSubject(){
  const sub=S.sub;const sd=D.subs[sub.id]||{seenIds:[],themeStats:{}};
  const ss=D.sessions.filter(s=>s.sub===sub.id);
  const a=ss.length>0?Math.round(ss.reduce((x,s)=>x+s.score/s.total*100,0)/ss.length):null;
  const best=ss.length>0?Math.max(...ss.map(s=>Math.round(s.score/s.total*100))):null;

  const statsRow=ss.length>0?`<div style="display:flex;gap:10px;margin-bottom:24px">
    ${[["Sessions",ss.length],["Moy.",a+"%"],["Meilleur",best+"%"]].map(([l,v])=>`<div class="stat-card"><div class="stat-val">${v}</div><div class="stat-lbl">${l}</div></div>`).join("")}
  </div>`:"";

  const themeProgress=Object.keys(sd.themeStats).length>0?`<div style="margin-bottom:24px">
    <p class="label" style="margin-bottom:10px">Progression par thème</p>
    <div class="card" style="padding:14px 16px">
      ${sub.themes.filter(t=>sd.themeStats[t.label]).map(t=>{const ts=sd.themeStats[t.label];const p=pct(ts.correct,ts.total);return`
        <div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:5px">
            <span style="font-size:13px;color:var(--t1)">${t.emoji} ${h(t.label)}</span>
            <span style="font-size:12px;font-weight:700;color:${scoreColor(p)}">${p}% (${ts.total})</span>
          </div>
          <div class="progress-track"><div class="progress-fill" style="width:${p}%;background:${t.color}"></div></div>
        </div>`;}).join("")}
    </div>
  </div>`:"";

  const themeToggles=sub.themes.map(t=>{const on=S.cfg.themes.includes(t.id);return`
    <button onclick="toggleTheme('${t.id}')" class="theme-chip" style="border-color:${on?t.color:"var(--border)"};background:${on?t.color+"15":"var(--surf)"};color:${on?t.color:"var(--tm)"}">
      <span style="font-weight:600">${t.emoji} ${h(t.label)}</span>
      <div style="width:20px;height:20px;border-radius:50%;border:2px solid ${on?t.color:"var(--border)"};background:${on?t.color:"transparent"};display:flex;align-items:center;justify-content:center;font-size:11px;color:white;flex-shrink:0">${on?"✓":""}</div>
    </button>`;}).join("");

  const diffBtns=[{id:"f",l:"Facile",s:"Définitions & notions"},{id:"m",l:"Moyen",s:"Application & calculs"},{id:"h",l:"Difficile",s:"Cas pratiques & pièges"},{id:"x",l:"Mixte",s:"Tous niveaux mélangés"}].map(d=>`
    <button onclick="setDiff('${d.id}')" class="diff-chip" style="border-color:${S.cfg.diff===d.id?DC[d.id]:"var(--border)"};background:${S.cfg.diff===d.id?DC[d.id]+"12":"var(--surf)"}">
      <div class="diff-chip-label" style="color:${S.cfg.diff===d.id?DC[d.id]:"var(--t1)"}">${d.l}</div>
      <div class="diff-chip-sub">${d.s}</div>
    </button>`).join("");

  const countBtns=[5,7,10,15].map(n=>`
    <button onclick="setCount(${n})" class="count-chip" style="border-color:${S.cfg.count===n?sub.color:"var(--border)"};background:${S.cfg.count===n?"linear-gradient(135deg,"+sub.gfrom+","+sub.gto+")":"var(--surf)"};color:${S.cfg.count===n?"white":"var(--tm)"}">${n}</button>`).join("");

  return`<div class="screen relative">
    <!-- Hero header -->
    <div style="background:var(--surf2);border-bottom:1px solid var(--border);padding:calc(20px + var(--safe-top)) 20px 24px">
      <button onclick="goHub()" class="btn-back" style="margin-bottom:16px;display:inline-flex">‹ Retour</button>
      <div style="display:flex;align-items:center;gap:14px">
        <div style="width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,${sub.gfrom},${sub.gto});display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 4px 20px ${sub.color}40">${sub.emoji}</div>
        <div>
          <h2 style="font-size:22px;font-weight:800;color:var(--t1)">${h(sub.title)}</h2>
          <p style="font-size:13px;color:var(--tm);margin-top:2px">${h(sub.sub)} · ${sub.questions.length} questions</p>
        </div>
      </div>
    </div>

    <div class="pad" style="padding-top:20px">
      ${statsRow}
      ${themeProgress}

      <div class="card" style="padding:18px;margin-bottom:20px">
        <p class="label" style="margin-bottom:12px">Thèmes</p>
        <div class="stack" style="margin-bottom:20px">${themeToggles}</div>

        <p class="label" style="margin-bottom:10px">Difficulté</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px">${diffBtns}</div>

        <p class="label" style="margin-bottom:10px">Nombre de questions</p>
        <div style="display:flex;gap:8px">${countBtns}</div>
      </div>

      <button onclick="startSession()" class="btn-primary" style="margin-bottom:40px;background:linear-gradient(135deg,${sub.color},${sub.gto});">
        Commencer la session →
      </button>
    </div>
  </div>`;
}

function renderQuiz(){
  const sub=S.sub;const q=S.qs[S.cur];const tObj=sub.themes.find(t=>t.id===q.t)||sub.themes[0];
  const prog=Math.round((S.cur/S.qs.length)*100);const correctCt=S.ans.filter(a=>a.correct).length;

  const opts=q.o.map((opt,idx)=>{
    let cls="option",iconContent=["A","B","C","D"][idx];
    if(S.rev){
      if(idx===q.a)cls="option correct";
      else if(idx===S.sel)cls="option wrong";
      else cls="option dimmed";
    }else if(S.sel===idx)cls="option sel";
    if(S.rev&&idx===q.a)iconContent="✓";
    else if(S.rev&&idx===S.sel&&idx!==q.a)iconContent="✗";
    return`<button onclick="selectAnswer(${idx})" class="${cls}" ${S.rev&&idx!==q.a&&idx!==S.sel?"disabled":""}>
      <span class="opt-icon">${iconContent}</span>
      <span class="opt-text">${h(opt)}</span>
    </button>`;
  }).join("");

  const expl=S.rev?`<div class="expl ${S.sel===q.a?"ok":"bad"}">
    <div class="expl-head">${S.sel===q.a?"✅ Bonne réponse !":"💡 Explication"}</div>
    <p>${h(q.e)}</p>
  </div>`:"";

  const nextBtn=S.rev?`<button onclick="nextQuestion()" class="btn-primary" style="margin-top:16px;background:linear-gradient(135deg,${sub.color},${sub.gto})">
    ${S.cur+1<S.qs.length?"Question suivante →":"Voir mes résultats 🎯"}
  </button>`:"";

  return`<div class="screen">
    <!-- Sticky header -->
    <div class="quiz-top">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <button onclick="goSubject()" style="font-size:14px;color:var(--ts);background:none;border:none;cursor:pointer;font-family:var(--font)">✕</button>
        <span style="font-size:13px;font-weight:700;color:var(--t1)">${S.cur+1} <span style="color:var(--ts)">/ ${S.qs.length}</span></span>
        <span style="font-size:13px;font-weight:700;color:#10B981">✓ ${correctCt}</span>
      </div>
      <div class="progress-track" style="border-radius:0;border:none;border-bottom:1px solid var(--border)">
        <div class="progress-fill" style="width:${prog}%;background:${sub.color}"></div>
      </div>
    </div>

    <div class="pad" style="padding-top:18px;padding-bottom:32px">
      <!-- Tags -->
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
        <span class="pill" style="background:${tObj.color}15;color:${tObj.color};border-color:${tObj.color}30">${tObj.emoji} ${h(tObj.label)}</span>
        <span class="pill" style="background:${DC[q.d]}12;color:${DC[q.d]};border-color:${DC[q.d]}30">${DL[q.d]}</span>
      </div>

      <!-- Question card -->
      <div id="qcard" class="card" style="padding:20px 22px;margin-bottom:16px;border-left:3px solid ${tObj.color}">
        <p style="font-size:15px;font-weight:500;line-height:1.75;color:var(--t1);margin:0">${h(q.q)}</p>
      </div>

      <!-- Options -->
      <div class="stack">${opts}</div>
      ${expl}
      ${nextBtn}
    </div>
  </div>`;
}

function drawScoreRing(p,color){
  const size=140;const r=58;const c=document.getElementById("scoreCanvas");
  if(!c)return;c.width=c.height=size;const ctx=c.getContext("2d");
  // Track
  ctx.beginPath();ctx.arc(size/2,size/2,r,0,Math.PI*2);ctx.strokeStyle="#222230";ctx.lineWidth=12;ctx.stroke();
  // Fill
  if(p>0){
    const grad=ctx.createLinearGradient(0,0,size,size);grad.addColorStop(0,"#C9A84C");grad.addColorStop(1,"#E0B85C");
    ctx.beginPath();ctx.arc(size/2,size/2,r,-Math.PI/2,(-Math.PI/2)+(2*Math.PI*p/100));
    ctx.strokeStyle=grad;ctx.lineWidth=12;ctx.lineCap="round";ctx.stroke();
  }
}

function renderResults(){
  const sub=S.sub;const scoreN=S.ans.filter(a=>a.correct).length;const total=S.ans.length;const p=pct(scoreN,total);
  const grades=[{min:90,l:"Excellent",c:"#10B981",e:"🏆"},{min:75,l:"Très bien",c:"#6366F1",e:"👍"},{min:60,l:"Bien",c:"#F59E0B",e:"📈"},{min:0,l:"À retravailler",c:"#EF4444",e:"💪"}];
  const g=grades.find(x=>p>=x.min);
  const byTheme=sub.themes.map(t=>{const qs=S.ans.filter(a=>a.theme===t.id);if(!qs.length)return null;const c=qs.filter(a=>a.correct).length;return{...t,c,total:qs.length,pct:pct(c,qs.length)};}).filter(Boolean);

  const newBadgesHtml=S.newBadges.length>0?`<div class="card" style="padding:16px;margin-bottom:20px;border-color:${sub.color}40">
    <p style="font-size:12px;font-weight:700;color:${sub.color};letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">🎉 Nouveau badge débloqué !</p>
    ${S.newBadges.map(b=>`<div style="display:flex;align-items:center;gap:12px"><span style="font-size:28px">${b.emoji}</span><div><div style="font-size:14px;font-weight:700;color:var(--t1)">${h(b.label)}</div><div style="font-size:12px;color:var(--tm)">${h(b.desc)}</div></div></div>`).join("")}
  </div>`:"";

  const byThemeHtml=byTheme.length>1?`<div style="margin-bottom:24px">
    <p class="label" style="margin-bottom:12px">Résultats par thème</p>
    ${byTheme.map(t=>`<div class="card-sm" style="padding:13px 16px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
        <span style="font-size:13px;color:var(--t1)">${t.emoji} ${h(t.label)}</span>
        <span style="font-size:13px;font-weight:700;color:${scoreColor(t.pct)}">${t.c}/${t.total} (${t.pct}%)</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${t.pct}%;background:${t.color}"></div></div>
    </div>`).join("")}
  </div>`:"";

  const histSess=D.sessions.filter(s=>s.sub===sub.id);
  const histHtml=histSess.length>1?`<div style="margin-bottom:24px">
    <p class="label" style="margin-bottom:12px">Historique</p>
    <div class="hist-row">
      ${histSess.slice(-8).reverse().map((s,i)=>{const p2=Math.round(s.score/s.total*100);return`<div class="hist-box ${i===0?"latest":""}">
        <div style="font-size:13px;font-weight:800;color:${scoreColor(p2)}">${p2}%</div>
        <div style="font-size:10px;color:var(--ts);margin-top:2px">${s.score}/${s.total}</div>
      </div>`;}).join("")}
    </div>
  </div>`:"";

  setTimeout(()=>drawScoreRing(p,g.c,isDark),50);

  return`<div class="screen relative">
    <!-- Hero -->
    <div style="padding:40px 20px 28px;text-align:center;border-bottom:1px solid var(--border)">
      <div class="score-ring">
        <canvas id="scoreCanvas"></canvas>
        <div class="score-inner">
          <div class="score-pct" style="color:var(--t1)">${p}%</div>
          <div class="score-lbl">${scoreN}/${total}</div>
        </div>
      </div>
      <div style="display:inline-block;background:${g.c};color:white;border-radius:20px;padding:6px 20px;font-size:14px;font-weight:700;margin-bottom:14px">${g.e} ${g.l}</div>
      <div style="display:inline-flex;align-items:center;gap:8px;background:rgba(79,70,229,.1);border:1px solid rgba(79,70,229,.25);border-radius:14px;padding:10px 18px;font-size:15px;font-weight:700;color:#818CF8">✨ +${S.earned} XP gagnés</div>
    </div>

    <div class="pad" style="padding-top:24px">
      ${newBadgesHtml}
      ${byThemeHtml}
      ${histHtml}

      <div class="stack" style="padding-bottom:40px">
        <button onclick="startSession()" class="btn-primary" style="background:linear-gradient(135deg,${sub.color},${sub.gto})">🔄 Nouvelle session</button>
        <button onclick="goSubject()" class="btn-soft">Changer les réglages</button>
        <button onclick="goHub()" class="btn-ghost">Accueil</button>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════
function render(){
  const app=document.getElementById("app");
  const map={hub:renderHub,subject:renderSubject,quiz:renderQuiz,results:renderResults};
  app.innerHTML=(map[S.screen]||renderHub)();
  app.scrollTop=0;
}

// INIT
initFavicon();
render();
</script>

</body>
</html>
