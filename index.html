<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Entraîneur">
<meta name="theme-color" content="#0D0D12">
<title>Entraîneur Partiel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
<style>
/* ── TOKENS — dark mode fixe ─────────────────── */
:root {
  --bg:#0D0D12;
  --bg2:#111118;
  --surf:#16161F;
  --surf2:#1E1E28;
  --border:#222230;
  --border2:#2E2E3E;
  --t1:#F0EDE8;
  --t2:#C9A84C;
  --tm:#7A7A9A;
  --ts:#44445A;
  --gold:#C9A84C;
  --green:#2D9B6E;
  --red:#E0344A;
  --blue:#2B7EE0;
  --violet:#9B5DE5;
  --grad:linear-gradient(135deg,#C9A84C,#E0B85C);
  --shadow:0 4px 20px rgba(0,0,0,.5);
  --shadow2:0 2px 10px rgba(0,0,0,.35);
  --font:'DM Sans',system-ui,sans-serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,20px);
  --t:.18s ease;
}

/* ── RESET ───────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:#0D0D12}
body{height:100%;background:#0D0D12;color:#F0EDE8;font-family:‘DM Sans’,system-ui,sans-serif;overflow:hidden}
button{font-family:‘DM Sans’,system-ui,sans-serif;cursor:pointer;border:none;background:none;color:inherit}

/* ── SCROLL ──────────────────────────────────── */
#app{height:100vh;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:#0D0D12;transition:opacity var(–t),transform var(–t)}
#app.fading{opacity:0;transform:translateX(10px)}
.screen{min-height:100%;padding-bottom:var(–safe-bot)}

/* ── CARDS ───────────────────────────────────── */
.card{background:#16161F;border:1px solid #222230;border-radius:18px}
.card-sm{background:#16161F;border:1px solid #222230;border-radius:14px}
.card-xs{background:#1E1E28;border:1px solid #222230;border-radius:12px}

/* ── TYPOGRAPHY ──────────────────────────────── */
.label{font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#7A7A9A}
.display{font-size:26px;font-weight:800;color:#F0EDE8}

/* ── LAYOUT ──────────────────────────────────── */
.pad{padding:0 20px}
.stack{display:flex;flex-direction:column;gap:10px}

/* ── BUTTONS ─────────────────────────────────── */
.btn-primary{width:100%;padding:17px;background:linear-gradient(135deg,#C9A84C,#E0B85C);color:#0D0D12;border-radius:16px;font-size:15px;font-weight:800;letter-spacing:.3px;box-shadow:0 4px 20px rgba(201,168,76,.3);transition:opacity .15s,transform .1s;display:block}
.btn-primary:active{transform:scale(.97);opacity:.9}
.btn-soft{width:100%;padding:15px;background:#1E1E28;border:1px solid #2E2E3E;border-radius:14px;font-size:14px;font-weight:600;color:#F0EDE8;transition:background .15s}
.btn-ghost{width:100%;padding:13px;background:transparent;border:1px solid #222230;border-radius:14px;font-size:13px;color:#7A7A9A}

/* ── PROGRESS ────────────────────────────────── */
.progress-track{height:4px;background:#1E1E28;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .5s ease}
.xp-track{height:6px;background:#1E1E28;border-radius:6px;overflow:hidden}
.xp-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#C9A84C,#E0B85C);transition:width 1.2s ease}

/* ── STATS ───────────────────────────────────── */
.stat-card{flex:1;background:#16161F;border:1px solid #222230;border-radius:16px;padding:12px 8px;text-align:center}
.stat-val{font-size:18px;font-weight:800;color:#F0EDE8;margin-top:3px}
.stat-lbl{font-size:10px;font-weight:500;color:#7A7A9A;margin-top:3px;text-transform:uppercase;letter-spacing:1px}

/* ── SUBJECT CARD ────────────────────────────── */
.sub-card{width:100%;background:#16161F;border:1px solid #222230;border-radius:18px;padding:18px 20px;text-align:left;display:flex;justify-content:space-between;align-items:center;border-left-width:3px;cursor:pointer;transition:background .15s}
.sub-card:active{background:#1E1E28}

/* ── OPTION BUTTONS ──────────────────────────── */
.option{width:100%;background:#16161F;border:1.5px solid #222230;border-radius:14px;padding:13px 14px;text-align:left;display:flex;align-items:flex-start;gap:10px;transition:all .15s;cursor:pointer}
.option:active:not([disabled]){transform:scale(.98)}
.option.sel    {background:#1E1E28;border-color:#C9A84C}
.option.correct{background:#0D2B1E;border-color:#2D9B6E}
.option.wrong  {background:#2B0F14;border-color:#E0344A}
.option.dimmed {opacity:.38}
.opt-icon{width:26px;height:26px;border-radius:50%;background:#1E1E28;border:1px solid #2E2E3E;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;margin-top:1px;color:#7A7A9A;transition:all .15s}
.option.correct .opt-icon{background:#2D9B6E;border-color:#2D9B6E;color:#fff}
.option.wrong   .opt-icon{background:#E0344A;border-color:#E0344A;color:#fff}
.option.sel     .opt-icon{background:#C9A84C;border-color:#C9A84C;color:#0D0D12}
.opt-text{font-size:14px;line-height:1.5;flex:1;color:#C5C0D8;transition:color .15s}
.option.correct .opt-text{color:#6EE7B7}
.option.wrong   .opt-text{color:#FCA5A5}
.option.dimmed  .opt-text{color:#44445A}
.option.sel     .opt-text{color:#F0EDE8}

/* ── EXPLANATION ─────────────────────────────── */
.expl{border-radius:14px;padding:16px 18px;margin-top:14px;animation:fadeUp .3s ease}
.expl.ok {background:#0D2B1E;border:1px solid #2D9B6E}
.expl.bad{background:#1A1428;border:1px solid #C9A84C}
.expl-head{font-size:12px;font-weight:700;letter-spacing:.5px;margin-bottom:7px}
.expl.ok  .expl-head{color:#6EE7B7}
.expl.bad .expl-head{color:#C9A84C}
.expl p{font-size:13px;line-height:1.75;color:#C5C0D8}

/* ── CHIPS ───────────────────────────────────── */
.theme-chip{background:#16161F;border:1.5px solid #222230;border-radius:12px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;width:100%;text-align:left;cursor:pointer;transition:all .15s;color:#F0EDE8}
.diff-chip{background:#16161F;border:1.5px solid #222230;border-radius:12px;padding:12px;text-align:left;width:100%;cursor:pointer;transition:border-color .15s}
.count-chip{flex:1;padding:11px 6px;border-radius:11px;font-size:15px;font-weight:700;border:1.5px solid #222230;background:#16161F;color:#7A7A9A;cursor:pointer;transition:all .15s}

/* ── PILLS & BADGES ──────────────────────────── */
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;border:1px solid}
.badge-item{display:inline-flex;align-items:center;gap:6px;background:#16161F;border:1px solid #222230;border-radius:12px;padding:6px 12px;font-size:12px;color:#F0EDE8;margin:3px}

/* ── QUIZ HEADER ─────────────────────────────── */
.quiz-top{background:#0D0D12;padding:calc(14px + var(–safe-top)) 20px 12px;position:sticky;top:0;z-index:20;border-bottom:1px solid #222230}

/* ── HISTORY ─────────────────────────────────── */
.hist-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.hist-box{flex-shrink:0;background:#16161F;border:1px solid #222230;border-radius:12px;padding:10px 10px;text-align:center;min-width:52px}
.hist-box.latest{background:#1E1E28;border-color:#C9A84C}

/* ── SCORE RING ──────────────────────────────── */
.score-ring{width:140px;height:140px;margin:0 auto 16px;position:relative}
.score-ring canvas{position:absolute;top:0;left:0}
.score-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-pct{font-size:34px;font-weight:800;color:#F0EDE8;line-height:1}
.score-lbl{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-top:2px;color:#7A7A9A}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>

</head>
<body>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════════
// QUESTION BANKS — Questions reformulées
// ═══════════════════════════════════════════════
const ENT_Q=[
  // ENTREPRISE INDIVIDUELLE
  {id:1,t:"ei",d:"f",
   q:"La loi du 14 février 2022 a profondément réformé le statut de l'entrepreneur individuel. Parmi les principes suivants, lequel a été instauré par cette réforme comme avancée majeure ?",
   o:["L'obligation de constituer un capital social minimum de 1 000 €","La séparation automatique du patrimoine professionnel et du patrimoine personnel","L'imposition obligatoire des bénéfices à l'impôt sur les sociétés","La publication annuelle obligatoire des comptes de l'entreprise"],
   a:1,e:"La loi du 14/02/2022 instaure la séparation automatique du patrimoine pro et perso, supprime l'EIRL devenue inutile, et ouvre une option pour l'IS."},

  {id:2,t:"ei",d:"f",
   q:"Un graphiste indépendant exerce une activité de conseil en communication visuelle sous forme d'entreprise individuelle. Dans quelle catégorie fiscale ses bénéfices seront-ils imposés ?",
   o:["BIC – Bénéfices Industriels et Commerciaux","BA – Bénéfices Agricoles","BNC – Bénéfices Non Commerciaux","Traitements et salaires"],
   a:2,e:"Les activités libérales (conseil, design, professions intellectuelles) relèvent des BNC. Les activités commerciales/artisanales relèvent des BIC, les agricoles des BA."},

  {id:3,t:"ei",d:"f",
   q:"Contrairement aux sociétés commerciales, l'entrepreneur individuel bénéficie d'obligations allégées en matière de communication financière. Quelle obligation est-il dispensé de respecter ?",
   o:["Tenir une comptabilité (livre-journal et grand livre)","Publier ses comptes annuels (bilan, compte de résultat)","Établir un bilan et un compte de résultat en fin d'exercice","Transmettre sa déclaration de résultats aux impôts"],
   a:1,e:"L'EI n'a pas l'obligation de publier ses comptes annuels, contrairement aux sociétés. Elle doit en revanche tenir une comptabilité et établir un bilan en interne."},

  {id:4,t:"ei",d:"f",
   q:"Un entrepreneur individuel s'inscrit sur le guichet unique. Il sera automatiquement affilié à un régime de protection sociale. Lequel ?",
   o:["Le régime général des salariés de la Sécurité sociale","Le régime de sécurité sociale des artistes-auteurs (AGESSA)","La Sécurité Sociale des Indépendants (SSI) — régime TNS","La Mutuelle Sociale Agricole (MSA)"],
   a:2,e:"L'entrepreneur individuel relève obligatoirement du régime TNS (Travailleurs Non-Salariés), géré par la SSI. Les cotisations représentent 35 à 49 % du bénéfice."},

  {id:5,t:"ei",d:"m",
   q:"Marie est graphiste freelance, célibataire, et réalise un bénéfice imposable de 45 000 € en 2026. Selon le barème progressif de l'IR en vigueur, à quel taux marginal est soumise la fraction de son revenu comprise entre 29 580 € et 84 577 € ?",
   o:["11 %","20 %","30 %","41 %"],
   a:2,e:"Barème IR 2026 : 0 % < 11 600 € / 11 % de 11 601 à 29 579 € / 30 % de 29 580 à 84 577 € / 41 % de 84 578 à 181 917 € / 45 % au-delà."},

  {id:6,t:"ei",d:"m",
   q:"Julien et Sophie sont mariés, sans enfant, et déposent une déclaration commune avec un revenu net imposable total de 63 000 €. Combien de parts de quotient familial représente leur foyer fiscal ?",
   o:["1 part","1,5 part","2 parts","3 parts"],
   a:2,e:"Un couple marié ou pacsé sans enfant dispose de 2 parts de quotient familial — 1 part par personne. Le quotient familial divise le revenu imposable par le nombre de parts."},

  {id:7,t:"ei",d:"m",
   q:"Thomas exploite une entreprise individuelle rentable. Il se demande comment son bénéfice sera intégré dans sa situation fiscale personnelle. Quelle est la règle applicable ?",
   o:["Il est imposé séparément au niveau de l'entreprise, comme dans une société","Il est intégré directement dans la déclaration annuelle de revenus de l'entrepreneur, soumis au barème progressif de l'IR","Il n'est imposé que lors du versement effectif des bénéfices à titre personnel","Il est exonéré d'IR si inférieur à 10 000 € par an"],
   a:1,e:"L'EI n'a pas de personnalité morale distincte. Le résultat de l'entreprise est directement intégré à la déclaration de revenus personnelle de l'entrepreneur, soumis au barème progressif de l'IR."},

  {id:8,t:"ei",d:"m",
   q:"Amélie et Karim sont mariés et ont trois enfants à charge. Combien de parts de quotient familial leur foyer fiscal représente-t-il pour le calcul de l'impôt sur le revenu ?",
   o:["3 parts","3,5 parts","4 parts","5 parts"],
   a:2,e:"Couple = 2 parts + 1er enfant = ½ part + 2e enfant = ½ part + 3e enfant = 1 part (à partir du 3e) → total = 4 parts. L'effet fiscal du 3e enfant est donc plus important."},

  {id:9,t:"ei",d:"h",
   q:"Mme Leroy exploite une EI et réalise un déficit de 10 000 € sur l'exercice. Son conjoint perçoit par ailleurs 5 000 € de salaires nets imposables. Quel est le revenu imposable du foyer fiscal, et que devient l'excédent déficitaire ?",
   o:["Le déficit est perdu, le revenu imposable est 5 000 €","Le déficit est reportable sur les bénéfices des 3 années suivantes uniquement","Le revenu imposable est 0 €, et l'excédent de 5 000 € est reportable sur le revenu global des 6 années suivantes (N+1 à N+6)","Le revenu imposable est 0 € mais le déficit est définitivement perdu"],
   a:2,e:"Le déficit (10 000 €) s'impute sur les autres revenus du foyer (5 000 €). Revenu = 0 €. Le reliquat déficitaire de 5 000 € est reportable sur le revenu global des 6 années suivantes (N+1 à N+6 maximum)."},

  {id:10,t:"ei",d:"h",
   q:"Un entrepreneur individuel soumis au régime TNS s'interroge sur sa protection sociale. Sur quelle base ses cotisations sociales obligatoires sont-elles calculées, et à quel niveau ?",
   o:["Sur le chiffre d'affaires brut, à un taux fixe de 22 %","Sur le bénéfice avant impôt, entre 35 et 49 % selon les catégories de cotisations","Sur le bénéfice après impôt, à un taux moyen de 25 %","Sur un forfait annuel fixe indépendant des résultats de l'activité"],
   a:1,e:"Les cotisations TNS sont calculées sur le bénéfice avant impôt, entre 35 et 49 % (maladie, retraite de base, retraite complémentaire, invalidité, formation, CSG/CRDS). Des cotisations minimales sont dues même en l'absence de bénéfice."},

  {id:11,t:"ei",d:"h",
   q:"Un entrepreneur individuel réalise un déficit qui dépasse l'ensemble des autres revenus de son foyer fiscal. Quelle est la règle de report applicable à cet excédent non imputé ?",
   o:["Il est définitivement perdu et ne peut être reporté","Il est reportable uniquement sur les bénéfices professionnels des 3 années suivantes","Il est reportable sur le revenu global des 6 années suivantes, de N+1 à N+6","Il génère automatiquement un crédit d'impôt remboursable"],
   a:2,e:"L'excédent de déficit non absorbé par les autres revenus du foyer peut être imputé sur le revenu global des années N+1 à N+6 (6 années maximum). Au-delà, le droit au report est prescrit."},

  {id:12,t:"ei",d:"f",
   q:"Une entreprise individuelle dispose-t-elle d'une personnalité morale distincte de celle de son créateur, à l'image d'une société ?",
   o:["Oui, depuis la réforme de la loi du 14 février 2022","Non, une EI n'a jamais de personnalité morale distincte de celle de l'entrepreneur","Oui, si le capital professionnel dépasse 1 000 €","Oui, dès lors qu'elle est immatriculée sur le guichet unique"],
   a:1,e:"L'EI n'a jamais de personnalité morale distincte. Seules les sociétés (SAS, SARL, SA…) acquièrent la personnalité morale par leur immatriculation au RCS."},

  // MICRO-ENTREPRISE
  {id:13,t:"me",d:"f",
   q:"Vous souhaitez créer une micro-entreprise en 2026 pour exercer une activité de consultant en stratégie digitale, qui est une prestation de services. Quel est le plafond annuel de chiffre d'affaires à ne pas dépasser pour maintenir ce régime ?",
   o:["77 700 € HT par an","83 600 € HT par an","188 700 € HT par an","203 100 € HT par an"],
   a:1,e:"Depuis le 1er janvier 2026 (valable jusqu'en 2028) : 83 600 €/an pour les prestations de services, et 203 100 €/an pour les activités d'achat-revente ou les prestations d'hébergement."},

  {id:14,t:"me",d:"f",
   q:"Un micro-entrepreneur exerce une activité libérale (BNC) et déclare 50 000 € de chiffre d'affaires annuel. Quel abattement forfaitaire s'applique sur ce CA pour déterminer son revenu net imposable ?",
   o:["71 % du chiffre d'affaires","50 % du chiffre d'affaires","34 % du chiffre d'affaires","25 % du chiffre d'affaires"],
   a:2,e:"Les abattements forfaitaires représentent toutes les charges de l'entreprise : 71 % pour l'achat-revente/hébergement, 50 % pour les prestations de services BIC, 34 % pour les activités libérales BNC."},

  {id:15,t:"me",d:"f",
   q:"Un micro-entrepreneur n'a réalisé aucun chiffre d'affaires sur le mois écoulé. Est-il quand même tenu de faire sa déclaration de CA auprès de l'URSSAF, et quelle pénalité s'applique en cas d'oubli ?",
   o:["Non, il n'est pas nécessaire de déclarer un CA nul","Oui, la déclaration reste obligatoire, sous peine d'une pénalité de 52 € par déclaration manquante ou en retard","Oui, la déclaration est obligatoire mais aucune pénalité n'est prévue pour un CA nul","Non, uniquement en cas d'activité réelle"],
   a:1,e:"La déclaration de CA est toujours obligatoire, même pour un montant nul. La pénalité est de 52 € par déclaration manquante ou en retard. La déclaration se fait en ligne sur autoentrepreneur.urssaf.fr."},

  {id:16,t:"me",d:"f",
   q:"Un micro-entrepreneur soumis à la franchise en base de TVA établit une facture pour une prestation à un client professionnel. Quelle mention est légalement obligatoire sur cette facture concernant la TVA ?",
   o:["\"TVA récupérée sur les achats à 20 %\"","\"TVA non applicable en vertu de l'article 293 B du CGI\"","\"Exonération TVA accordée au statut de micro-entrepreneur\"","\"TVA à la charge du client, réglable directement\""],
   a:1,e:"La mention \"TVA non applicable – article 293 B du CGI\" est obligatoire sur toutes les factures. Le micro-entrepreneur en franchise ne facture pas, ne déclare pas et ne récupère pas la TVA."},

  {id:17,t:"me",d:"f",
   q:"Une étudiante en design envisage de créer une deuxième micro-entreprise pour une nouvelle activité, en plus de celle qu'elle possède déjà. Est-ce juridiquement possible ?",
   o:["Oui, sans limitation du nombre de micro-entreprises possédées","Oui, mais uniquement deux micro-entreprises au maximum","Non, une seule micro-entreprise est autorisée par personne, mais plusieurs activités peuvent y être rattachées","Oui, si les deux activités relèvent de catégories fiscales différentes (BIC et BNC)"],
   a:2,e:"La loi n'autorise qu'une seule micro-entreprise par personne physique. En revanche, il est possible d'y exercer plusieurs activités différentes, même sans lien entre elles. Il faut simplement déclarer l'adjonction de la nouvelle activité."},

  {id:18,t:"me",d:"m",
   q:"Léa débute son activité de consultante indépendante (prestation de services) le 1er juillet 2026. Pour cette première demi-année d'activité, quel plafond de chiffre d'affaires proratisé s'applique à elle ?",
   o:["83 600 €","41 800 €","77 700 €","101 550 €"],
   a:1,e:"Les seuils de la micro-entreprise sont proratisés selon la durée d'activité. Démarrant le 1er juillet 2026 (6 mois sur 12), Léa dispose d'un plafond de : 83 600 € ÷ 2 = 41 800 € pour son activité de prestation de services."},

  {id:19,t:"me",d:"m",
   q:"Un micro-entrepreneur exerce une activité de réparation de vélos (prestation de services de nature artisanale, BIC). En 2025, quel est le taux de cotisations sociales applicable à son chiffre d'affaires déclaré ?",
   o:["12,3 % du CA","21,2 % du CA","24,6 % du CA","23,2 % du CA"],
   a:1,e:"Taux au 1er janvier 2025 : 12,3 % pour l'achat-revente et l'hébergement ; 21,2 % pour les prestations de services commerciales ou artisanales (BIC) ; 24,6 % pour les autres prestations et libéraux BNC ; 23,2 % pour les libéraux réglementés affiliés à la CIPAV."},

  {id:20,t:"me",d:"m",
   q:"Quel est le seuil de chiffre d'affaires de base en dessous duquel une entreprise commerciale (vente de marchandises) bénéficie de la franchise en base de TVA ?",
   o:["83 600 € HT","77 700 € HT","85 000 € HT","93 500 € HT"],
   a:2,e:"Les seuils de franchise TVA (différents des seuils micro-entreprise) sont : seuil de base à 85 000 € pour les activités commerciales, et 37 500 € pour les prestations de services artisanales/commerciales et libérales."},

  {id:21,t:"me",d:"m",
   q:"Un micro-entrepreneur éligible choisit d'opter pour le prélèvement libératoire de l'IR. Pour une activité d'achat-revente, quel taux s'applique directement sur le chiffre d'affaires déclaré ?",
   o:["2,2 % du CA","1,7 % du CA","1 % du CA","0,5 % du CA"],
   a:2,e:"Taux du prélèvement libératoire : 1 % pour l'achat-revente et fourniture de logement ; 1,7 % pour les prestations de services artisanales/commerciales (BIC) ; 2,2 % pour les autres prestations de services (BNC libéraux)."},

  {id:22,t:"me",d:"m",
   q:"Depuis quelle loi et à partir de quel seuil de chiffre d'affaires l'ouverture d'un compte bancaire dédié à l'activité professionnelle devient-elle obligatoire pour un micro-entrepreneur ?",
   o:["Dès la création de la micro-entreprise, sans condition","Dès le premier euro de chiffre d'affaires généré","Loi PACTE du 22 mai 2019 : si le CA dépasse 10 000 € sur au moins deux années consécutives","Uniquement si le CA dépasse le seuil de franchise en base de TVA"],
   a:2,e:"La loi PACTE du 22/05/2019 rend obligatoire un compte bancaire dédié à l'activité professionnelle uniquement lorsque le CA est supérieur à 10 000 € pendant au moins 2 années civiles consécutives."},

  {id:23,t:"me",d:"m",
   q:"Un micro-entrepreneur prestataire de services voit son chiffre d'affaires dépasser le seuil de base de la franchise TVA. À quel seuil majoré peut-il encore maintenir la franchise, et à partir de quand la TVA s'applique-t-elle si ce seuil est dépassé ?",
   o:["Seuil majoré à 37 500 €, TVA dès le 1er janvier de l'année suivante","Seuil majoré à 41 250 €, TVA applicable dès le 1er jour du mois de dépassement du seuil majoré","Seuil majoré à 83 600 €, TVA applicable à partir du trimestre suivant","Seuil majoré à 85 000 €, TVA applicable dès le lendemain du dépassement"],
   a:1,e:"Seuils TVA majorés : 41 250 € pour les services, 93 500 € pour le commerce. Si le seuil majoré est dépassé, la franchise en base de TVA cesse de s'appliquer dès le 1er jour du mois de dépassement (effet potentiellement rétroactif)."},

  {id:24,t:"me",d:"h",
   q:"Une entreprise commerciale réalise 82 000 € de CA en 2024, puis 90 500 € en 2025. Le seuil de base de franchise TVA est à 85 000 € et le seuil majoré à 93 500 €. Cette entreprise perd-elle la franchise en base de TVA en 2025 ?",
   o:["Oui, car son CA 2025 dépasse le seuil de base de 85 000 €","Non, car le CA de l'année précédente (2024) est inférieur au seuil de base, et le CA 2025 est inférieur au seuil majoré de 93 500 €","Oui, dès le 1er janvier 2025, automatiquement","Non, car elle reste en dessous du seuil micro-entreprise de 203 100 €"],
   a:1,e:"La franchise se maintient si deux conditions cumulatives sont réunies : (1) CA N-1 (2024 = 82 000 €) inférieur au seuil de base (85 000 €) ✓, ET (2) CA N (2025 = 90 500 €) inférieur au seuil majoré (93 500 €) ✓. Les deux sont remplies, la franchise est maintenue."},

  {id:25,t:"me",d:"h",
   q:"Un micro-entrepreneur souhaite opter pour le prélèvement libératoire de l'impôt sur le revenu. Quelle condition liée au revenu de son foyer doit-il impérativement respecter ?",
   o:["Son chiffre d'affaires doit être inférieur à 83 600 €","Le revenu fiscal de référence (RFR) de son foyer doit être inférieur ou égal à 28 797 € par part de quotient familial","Son bénéfice net annuel ne doit pas dépasser 20 000 €","Il n'existe aucune condition de revenu pour bénéficier de cette option"],
   a:1,e:"Seuls les contribuables dont le RFR (revenu fiscal de référence, consultable sur l'avis d'imposition) du foyer est inférieur ou égal à 28 797 € par part de quotient familial peuvent opter pour le prélèvement libératoire."},

  {id:26,t:"me",d:"h",
   q:"Un micro-entrepreneur éligible exerce une activité de vente de marchandises et opte pour le prélèvement libératoire de l'IR. Son CA annuel est de 60 000 €. Quel montant d'impôt sur le revenu devra-t-il acquitter au titre de cette activité ?",
   o:["60 000 × 34 % d'abattement, puis IR au barème = environ 5 200 €","60 000 × 1 % = 600 €","60 000 × 71 % d'abattement, puis barème progressif de l'IR","60 000 × 1,7 % = 1 020 €"],
   a:1,e:"Avec le prélèvement libératoire, le taux pour l'achat-revente est de 1 % du CA. Soit 60 000 × 1 % = 600 €. Sans cette option, l'abattement de 71 % s'appliquerait, puis le barème progressif de l'IR."},

  {id:27,t:"me",d:"h",
   q:"Parmi les professions suivantes exercées à titre libéral, laquelle est exclue du régime de la micro-entreprise car elle relève d'une profession libérale réglementée ne dépendant pas de la caisse CIPAV ?",
   o:["Graphiste designer freelance","Développeur web indépendant","Expert-comptable","Photographe de mariage"],
   a:2,e:"Sont exclus du régime micro-entreprise : les professions libérales réglementées ne relevant pas de la CIPAV, notamment les avocats, médecins, notaires et experts-comptables. Graphistes, développeurs et photographes peuvent en revanche être micro-entrepreneurs."},

  {id:28,t:"me",d:"m",
   q:"En 2026, quel est le plafond annuel de chiffre d'affaires applicable à une micro-entreprise exerçant une activité d'achat-revente de marchandises ou une prestation d'hébergement ?",
   o:["188 700 € par an","203 100 € par an","77 700 € par an","83 600 € par an"],
   a:1,e:"Seuils 2026-2027-2028 : 203 100 €/an pour les activités d'achat-revente, vente à consommer sur place, ou prestation d'hébergement. Ce seuil a augmenté par rapport aux 188 700 € applicables jusqu'en 2025."},

  {id:29,t:"me",d:"m",
   q:"Le dispositif ACRE permet à certains micro-entrepreneurs de bénéficier d'un avantage sur leurs cotisations sociales la première année. En quoi consiste concrètement cet avantage ?",
   o:["Une exonération totale des cotisations sociales pendant 12 mois","Une réduction de 25 % sur les cotisations sociales pendant la première année d'activité","Une exonération de 50 % des cotisations pendant 2 ans","Une réduction de 10 % des cotisations pendant 3 ans"],
   a:1,e:"L'ACRE consiste en une exonération partielle des charges sociales de 25 % pendant la première année d'activité, sous conditions (moins de 26 ans, demandeur d'emploi, bénéficiaire du RSA, etc.). La demande se fait en ligne sur l'URSSAF."},

  {id:30,t:"me",d:"f",
   q:"Le régime de la micro-entreprise est-il accessible aux étudiants qui poursuivent leurs études en parallèle d'une activité professionnelle ?",
   o:["Non, il faut avoir terminé ses études et justifier d'une activité principale","Oui, le régime est explicitement ouvert aux étudiants souhaitant exercer une activité complémentaire à leurs études","Oui, mais uniquement pour les activités artistiques ou culturelles","Non, l'étudiant doit d'abord finir ses études pour s'immatriculer"],
   a:1,e:"Le régime micro-entrepreneur est expressément ouvert aux étudiants qui souhaitent développer une activité professionnelle — principale ou complémentaire — sans interrompre leurs études."},

  // ARTISTE-AUTEUR
  {id:31,t:"aa",d:"f",
   q:"Un illustrateur indépendant souhaite créer son activité d'auteur. À quel organisme de sécurité sociale doit-il s'affilier pour bénéficier du régime spécifique aux artistes-auteurs ?",
   o:["Directement à l'URSSAF, comme un travailleur indépendant (TNS)","À l'AGESSA et à la Maison des Artistes, rattachés au régime général","À Pôle Emploi / France Travail","À la Mutuelle Sociale Agricole (MSA)"],
   a:1,e:"L'artiste-auteur s'affilie à l'AGESSA (auteurs d'oeuvres littéraires, dramatiques, musicales, audiovisuelles) ou à la Maison des Artistes (arts visuels, graphiques et plastiques). Ce régime est rattaché au régime général."},

  {id:32,t:"aa",d:"f",
   q:"Le régime de sécurité sociale des artistes-auteurs offre des protections sociales comparables à celles des salariés pour certaines prestations. Cependant, une protection sociale majeure reste inaccessible. Laquelle ?",
   o:["L'assurance maladie-maternité","La retraite de base et complémentaire","L'assurance chômage et la protection contre les accidents du travail","La couverture invalidité-décès"],
   a:2,e:"Le régime artiste-auteur est rattaché au régime général pour la maladie, la maternité et la retraite. Cependant, l'artiste-auteur n'a PAS accès aux allocations chômage ni à la protection accidents du travail des salariés."},

  {id:33,t:"aa",d:"f",
   q:"Parmi les activités suivantes réalisées par un créateur numérique, laquelle entre dans le champ du régime des artistes-auteurs ?",
   o:["La mise à jour hebdomadaire du site web d'une entreprise cliente","La création d'un jeu vidéo interactif original conçu en dehors d'un contrat de travail","La réalisation de plans techniques et dessins industriels","L'administration et la maintenance d'un serveur (webmastering)"],
   a:1,e:"Un jeu vidéo original constitue une oeuvre multimédia créative éligible au régime artiste-auteur, dès lors qu'il porte l'empreinte de la personnalité de l'auteur et est créé hors contrat de travail. Les activités techniques (maintenance, mise à jour, plans) en sont exclues."},

  {id:34,t:"aa",d:"f",
   q:"Un artiste-auteur opte pour le régime micro-BNC pour sa déclaration fiscale. Quel abattement forfaitaire s'applique sur ses recettes brutes pour déterminer son revenu imposable ?",
   o:["71 % des recettes brutes","50 % des recettes brutes","34 % des recettes brutes","15 % des recettes brutes"],
   a:2,e:"En régime micro-BNC, l'abattement forfaitaire est de 34 % sur les recettes déclarées. Cet abattement est censé représenter toutes les charges professionnelles. Si les charges réelles dépassent 34 %, la déclaration contrôlée est plus avantageuse."},

  {id:35,t:"aa",d:"m",
   q:"Un illustrateur débutant réalise 60 000 € de recettes annuelles. Il se demande s'il peut encore opter pour le régime fiscal simplifié micro-BNC. Est-ce possible, et quel est le seuil déterminant ?",
   o:["Non, le seuil micro-BNC est fixé à 83 600 €, mais il n'est pas applicable aux artistes-auteurs","Oui, car son CA est inférieur à 77 700 € : il peut choisir entre micro-BNC (abattement 34 %) et déclaration contrôlée","Non, la déclaration contrôlée est obligatoire dès 37 500 €","Oui, mais le seuil est de 100 000 €"],
   a:1,e:"Si le CA est inférieur à 77 700 €, l'artiste-auteur peut choisir entre le régime micro-BNC (abattement forfaitaire de 34 %) et le régime de la déclaration contrôlée (comptabilité recettes-dépenses réelles). Au-dessus de 77 700 €, la déclaration contrôlée est obligatoire."},

  {id:36,t:"aa",d:"m",
   q:"Un artiste-auteur en régime micro-BNC déclare 10 000 € de recettes à l'URSSAF. Quelle sera l'assiette sociale retenue pour le calcul de ses cotisations sociales ?",
   o:["10 000 € (les recettes brutes déclarées)","6 600 € (après abattement de 34 % uniquement)","7 590 € (après abattement de 34 % puis majoration de 15 %)","8 500 € (après abattement forfaitaire de 15 %)"],
   a:2,e:"Assiette sociale micro-BNC = recettes × (1 - 34 %) × 1,15. Calcul : 10 000 × 0,66 = 6 600 € puis 6 600 × 1,15 = 7 590 €. Cette majoration de 15 % est spécifique au régime social des artistes-auteurs."},

  {id:37,t:"aa",d:"m",
   q:"Un artiste-auteur déclarant sous le régime de la déclaration contrôlée (BNC) doit s'acquitter de ses cotisations sociales trimestriellement. À quelles dates précises ces paiements sont-ils dus ?",
   o:["Les 31 mars, 30 juin, 30 septembre et 31 décembre","Les 15 janvier, 15 avril, 15 juillet et 15 octobre","Les 1er janvier, 1er avril, 1er juillet et 1er octobre","Une fois par an, avant le 31 mai"],
   a:1,e:"Les cotisations sociales en BNC (déclaration contrôlée) sont payées trimestriellement aux dates suivantes : 15 janvier, 15 avril, 15 juillet et 15 octobre. Les revenus déclarés par des diffuseurs (éditeurs, SACEM) font l'objet d'un précompte directement effectué par le diffuseur."},

  {id:38,t:"aa",d:"m",
   q:"En 2024, un photographe artiste-auteur donne régulièrement des cours en dehors de son atelier et participe à des débats publics sans lien direct avec ses oeuvres. Ces activités accessoires sont-elles couvertes par le régime artiste-auteur, et jusqu'à quel plafond ?",
   o:["Oui, sans limite de montant dès lors qu'elles sont accessoires à l'activité artistique","Oui, dans la limite de 13 980 € de revenus issus de ces activités accessoires par an en 2024","Non, les activités accessoires relèvent systématiquement du régime TNS","Oui, dans la limite de 5 000 € par an"],
   a:1,e:"En 2024, les activités accessoires (cours en atelier, débats, ateliers d'écriture, etc.) peuvent relever du régime artiste-auteur dans la limite de 13 980 € par an, à condition que l'auteur ait perçu des revenus artistiques l'année en cours ou dans les 2 années précédentes."},

  {id:39,t:"aa",d:"h",
   q:"Un artiste-auteur souhaite estimer le montant total de ses cotisations sociales. Quel est le taux global applicable à son assiette sociale (toutes cotisations et contributions confondues) ?",
   o:["21,2 % de l'assiette sociale","24,6 % de l'assiette sociale","16,2 % de l'assiette sociale","35 % de l'assiette sociale"],
   a:2,e:"Taux total : 16,2 % comprenant : SS 0,40 % (pris en charge par l'État), retraite plafonnée 6,90 % (dont 0,75 % pris en charge par l'État), CSG 9,20 % (dont 6,80 % déductibles fiscalement), CRDS 0,50 %, CFP 0,35 %."},

  {id:40,t:"aa",d:"h",
   q:"Pierre est salarié dans une agence de communication et crée, dans le cadre de ses fonctions et avec les ressources de l'entreprise, un logo original pour un client. Peut-il prétendre au régime artiste-auteur pour cette création et percevoir des droits d'auteur à titre personnel ?",
   o:["Oui, automatiquement, car toute création originale appartient à son auteur","Oui, à condition d'avoir négocié et fait inclure une clause spécifique dans son contrat de travail","Non, les salariés qui créent des oeuvres dans le cadre de leur contrat de travail sont exclus du régime artiste-auteur","Oui, si l'oeuvre est reconnue comme originale par une commission artistique"],
   a:2,e:"Les auteurs salariés qui créent des oeuvres dans le cadre de leur travail (missions définies, ressources de l'employeur) sont exclus du régime artiste-auteur. Une clause contractuelle peut toutefois être négociée pour organiser le partage des droits."},

  {id:41,t:"aa",d:"h",
   q:"Les revenus d'un artiste-auteur sont en principe classés dans quelle catégorie fiscale pour leur déclaration à l'impôt sur le revenu ?",
   o:["Traitements et salaires, systématiquement","BIC – Bénéfices Industriels et Commerciaux","BNC – Bénéfices Non Commerciaux, sauf si déclarés par un tiers","BA – Bénéfices Agricoles"],
   a:2,e:"Les revenus des artistes-auteurs relèvent par défaut des BNC. Toutefois, les revenus intégralement déclarés par un tiers (éditeurs, producteurs, SACEM…) peuvent être imposés dans la catégorie Traitements & Salaires, avec la possibilité de renoncer à ce classement."},

  {id:42,t:"aa",d:"m",
   q:"La CSG (Contribution Sociale Généralisée) fait partie des cotisations dues par les artistes-auteurs. Quel est son taux exact, et quelle fraction est déductible fiscalement ?",
   o:["7,5 % dont 5,1 % déductibles","9,2 % dont 6,8 % déductibles fiscalement","6,8 % dont la totalité est déductible","17,2 % dont 6,8 % déductibles"],
   a:1,e:"La CSG est de 9,20 %, dont 6,80 % sont déductibles fiscalement (ces 6,80 % viennent réduire le revenu imposable de l'artiste-auteur). Les 2,40 % restants ne sont pas déductibles."},

  // CRÉATION DE SOCIÉTÉ
  {id:43,t:"sc",d:"f",
   q:"Pierre et Alix décident de s'associer pour créer une société de communication. Quel acte juridique fondamental vont-ils devoir rédiger pour donner naissance à leur société et fixer ses règles de fonctionnement ?",
   o:["Un procès-verbal d'assemblée générale constitutive","Les statuts de la société","Le Kbis de la société","Une déclaration d'activité auprès des impôts"],
   a:1,e:"Les statuts sont l'acte fondateur (contrat entre associés, ou acte unilatéral pour l'associé unique) de la société. Ils fixent la forme, la dénomination, le capital, la durée (max 99 ans), l'objet, le siège et les organes de direction. L'immatriculation confère la personnalité morale."},

  {id:44,t:"sc",d:"f",
   q:"Une SAS soumise à l'impôt sur les sociétés réalise un bénéfice de 100 000 €. À quel taux normal l'IS sera-t-il appliqué sur ce résultat (hors taux réduit) ?",
   o:["15 % sur la totalité","20 % sur la totalité","25 % sur la totalité","33,33 % sur la totalité"],
   a:2,e:"Le taux normal de l'IS est de 25 %. Un taux réduit de 15 % s'applique sur la fraction de bénéfice inférieure à 42 500 € sous conditions (dont la libération totale du capital). Au-delà, le taux de 25 % s'applique."},

  {id:45,t:"sc",d:"f",
   q:"Marco est passionné de cuisine et apporte à la société qu'il crée avec ses associés ses recettes exclusives, son réseau professionnel et sa réputation dans le milieu gastronomique. À quel type d'apport cela correspond-il ?",
   o:["Un apport en numéraire (somme d'argent)","Un apport en nature (bien corporel ou incorporel)","Un apport en industrie (compétences, savoir-faire, notoriété)","Un apport en garantie"],
   a:2,e:"L'apport en industrie correspond à la mise à disposition de compétences, savoir-faire, travail, services ou notoriété. Contrairement aux apports en numéraire et en nature, il ne constitue PAS le capital social et les titres issus de cet apport ne sont pas transmissibles à des tiers."},

  {id:46,t:"sc",d:"f",
   q:"Deux créatifs veulent s'associer pour créer leur agence. L'un préfère la souplesse statutaire pour attirer des investisseurs, l'autre veut un cadre juridique plus encadré et rassurant. Quelle est la différence fondamentale entre SAS et SARL à cet égard ?",
   o:["La SAS a un capital minimum plus élevé que la SARL","La SAS est réservée aux activités artistiques et créatives","La SAS offre une grande liberté rédactionnelle des statuts ; la SARL est plus rigide car son fonctionnement est largement encadré par le Code de commerce","La SARL peut accueillir des associés personnes morales, la SAS non"],
   a:2,e:"La SAS est la forme la plus répandue car ses statuts sont librement rédigés (organes de direction, droits de vote différenciés, clauses d'agrément…). La SARL est plus rigide car ses statuts reprennent le cadre du Code de commerce, mais cela apporte une sécurité juridique appréciée."},

  {id:47,t:"sc",d:"f",
   q:"Une société vient d'être immatriculée au Registre du Commerce et des Sociétés. Quel document officiel lui est délivré et qui constitue sa carte d'identité légale ?",
   o:["Les statuts signés par les associés fondateurs","L'extrait Kbis délivré par le greffe du tribunal de commerce","L'acte de naissance de la société rédigé par un notaire","La déclaration d'existence transmise à l'URSSAF"],
   a:1,e:"Le Kbis (extrait du Registre du Commerce et des Sociétés) est le document officiel qui atteste de l'existence légale de la société et de son immatriculation. Il est délivré par le greffe du tribunal de commerce via le guichet unique de l'INPI."},

  {id:48,t:"sc",d:"m",
   q:"Lors de la création d'une SAS, M. A apporte 10 000 € en numéraire, Mme B apporte du matériel informatique évalué à 6 000 €, et M. C s'engage à consacrer son expertise technique à la société pour une valeur estimée à 8 000 €. Quel est le montant du capital social de cette société ?",
   o:["24 000 € (la somme des trois apports)","18 000 € (numéraire + nature uniquement)","16 000 € (numéraire + nature uniquement)","10 000 € (numéraire seulement)"],
   a:2,e:"Le capital social est constitué uniquement des apports en numéraire et en nature : 10 000 € + 6 000 € = 16 000 €. L'apport en industrie de M. C (8 000 €) ne contribue pas au capital mais lui donne droit à des titres spécifiques (vote + bénéfices)."},

  {id:49,t:"sc",d:"m",
   q:"Dans une SARL, le gérant détient exactement 50 % des parts sociales. Est-il considéré comme gérant majoritaire, et quel régime social lui est donc applicable ?",
   o:["Oui, il est majoritaire et relève du régime TNS","Non, à 50 % exactement il est qualifié de gérant égalitaire, ce qui le rattache au régime général des salariés s'il est rémunéré","Oui, toute détention de 50 % ou plus déclenche automatiquement le statut de gérant majoritaire","Non, il ne devient majoritaire qu'à partir de 75 % du capital"],
   a:1,e:"Le gérant est majoritaire uniquement s'il détient STRICTEMENT PLUS de 50 % (50 % + 1 part minimum). À 50 % exactement, il est gérant égalitaire et relève du régime général (assimilé salarié) s'il est rémunéré."},

  {id:50,t:"sc",d:"m",
   q:"Une PME soumise à l'IS réalise un bénéfice annuel de 35 000 €. Son capital est intégralement libéré. Quel taux d'imposition s'applique à ce bénéfice ?",
   o:["10 % (taux réduit PME)","15 % (taux réduit pour bénéfices < 42 500 € sous conditions)","20 % (taux intermédiaire)","25 % (taux normal de l'IS)"],
   a:1,e:"Le taux réduit d'IS à 15 % s'applique aux PME dont le capital est intégralement libéré et détenu à au moins 75 % par des personnes physiques, sur la fraction de bénéfice inférieure à 42 500 €. Au-delà, le taux normal de 25 % s'applique."},

  {id:51,t:"sc",d:"m",
   q:"Le président d'une SAS perçoit une rémunération mensuelle pour ses fonctions de direction. À quel régime de protection sociale est-il affilié en tant que dirigeant rémunéré ?",
   o:["Régime TNS (Travailleurs Non-Salariés), comme le gérant majoritaire de SARL","Régime général de la Sécurité sociale (statut assimilé salarié)","Régime des artistes-auteurs, si ses activités sont créatives","Il n'est soumis à aucun régime obligatoire"],
   a:1,e:"Le président de SAS rémunéré est affilié au régime général de la Sécurité sociale avec le statut d'assimilé salarié (cotisations plus élevées mais protection similaire aux salariés). À l'inverse, le gérant majoritaire de SARL relève du régime TNS."},

  {id:52,t:"sc",d:"m",
   q:"Depuis le 1er janvier 2026, à quel taux global les dividendes distribués aux associés sont-ils soumis par défaut dans le cadre du Prélèvement Forfaitaire Unique (PFU ou Flat Tax) ?",
   o:["30 % = 12,8 % d'IR + 17,2 % de prélèvements sociaux (avant 2026)","31,4 % = 12,8 % d'IR + 18,6 % de prélèvements sociaux (taux en vigueur depuis 2026)","25 % correspondant au taux de l'IS uniquement","15 % pour les PME et 25 % pour les grandes entreprises"],
   a:1,e:"La loi de finances pour 2026 a porté le PFU à 31,4 % (contre 30 % auparavant), décomposé en 12,8 % d'impôt sur le revenu et 18,6 % de prélèvements sociaux. Option possible pour le barème progressif avec abattement de 40 %."},

  {id:53,t:"sc",d:"m",
   q:"Lors de la création d'une SAS, les associés s'interrogent sur le calendrier de libération des apports en numéraire. Quelle fraction minimale doit être versée effectivement à la création, et dans quel délai le solde doit-il être libéré ?",
   o:["10 % à la création, solde dans un délai de 10 ans","20 % à la création, solde dans un délai de 5 ans (comme pour la SARL)","Au moins 50 % à la création, solde dans un délai de 5 ans","La totalité doit être versée avant l'immatriculation"],
   a:2,e:"En SAS : au moins 50 % des apports en numéraire doivent être libérés à la création, le reste dans un délai maximum de 5 ans. En SARL : seulement 20 % à la création, solde en 5 ans. Cette différence peut influencer le choix de la forme juridique."},

  {id:54,t:"sc",d:"h",
   q:"Dans une SARL, à quelle condition précise un gérant est-il qualifié de gérant majoritaire, et quel régime social en découle ?",
   o:["Il détient seul strictement plus de 50 % des parts, OU avec son conjoint (quel que soit le régime matrimonial) et ses enfants mineurs dépasse 50 % → régime TNS","Il dirige seul la société sans co-gérant, quel que soit son pourcentage de détention","La rémunération du gérant représente plus de 50 % des charges de la société","Il a été nommé gérant par une décision prise à la majorité des associés"],
   a:0,e:"Gérant majoritaire = détient seul > 50 % des parts sociales, OU avec son conjoint (tout régime matrimonial) + ses enfants mineurs > 50 %, OU par société interposée > 50 %. Dans tous ces cas → régime TNS. Sinon (minoritaire/égalitaire rémunéré) → régime général."},

  {id:55,t:"sc",d:"h",
   q:"Le gérant majoritaire d'une SARL perçoit des dividendes en plus de sa rémunération. Quelle fraction de ces dividendes est soumise aux cotisations sociales TNS, en plus des prélèvements sociaux habituels ?",
   o:["La totalité des dividendes est systématiquement soumise aux cotisations sociales TNS","La fraction des dividendes qui dépasse 10 % de la somme du capital social et du compte courant d'associé est soumise aux cotisations TNS","La fraction des dividendes dépassant 50 % de sa rémunération nette annuelle","Les dividendes ne sont jamais soumis à des cotisations sociales, quelle que soit la forme juridique"],
   a:1,e:"Pour le gérant majoritaire de SARL, la fraction des dividendes excédant 10 % du (capital social + compte courant d'associé) est assujettie aux cotisations sociales TNS (35-49 %). Cette règle anti-optimisation vise à éviter que le gérant remplace sa rémunération par des dividendes. En deçà de ce seuil : PFU à 31,4 %."},

  {id:56,t:"sc",d:"h",
   q:"Une SAS est soumise à l'IS par défaut. Dans quelles conditions ses associés peuvent-ils décider de passer temporairement à l'imposition des bénéfices à l'IR, et pour combien de temps ?",
   o:["Jamais, une SAS est définitivement et exclusivement soumise à l'IS","Sous conditions restrictives, pour une période maximum de 5 ans non renouvelable","Sans aucune restriction, pour une durée illimitée","Uniquement si le capital de la SAS est inférieur à 10 000 €"],
   a:1,e:"Les SAS et SARL soumises à l'IS peuvent opter pour l'IR sous conditions (ex : société récente, peu d'associés, activité non financière), pour une durée maximum de 5 ans non renouvelable. L'EURL dont l'associé unique est gérant est à l'IR par défaut avec option IS possible."},

  {id:57,t:"sc",d:"h",
   q:"Une société de conseil en design réalise un chiffre d'affaires de 300 000 € HT en prestations de services. Quel régime de TVA lui est obligatoirement applicable, et quelle obligation déclarative cela implique-t-il ?",
   o:["La franchise en base de TVA, elle ne déclare donc pas la TVA","Le régime simplifié d'imposition, avec deux acomptes semestriels","Le régime réel normal de TVA, avec une déclaration mensuelle de TVA","Un régime forfaitaire spécifique aux sociétés créatives"],
   a:2,e:"Le régime réel normal de TVA est obligatoire dès que le CA dépasse 254 000 € HT pour les services (ou 840 000 € pour le commerce). Il implique une déclaration de TVA mensuelle (CA3) récapitulant toutes les opérations du mois précédent."},

  {id:58,t:"sc",d:"h",
   q:"Un associé d'une SARL opte pour l'imposition de ses dividendes au barème progressif de l'IR plutôt qu'au PFU. Pour bénéficier de l'abattement de 40 % qui compense la double imposition, quelles conditions doit-il impérativement respecter ?",
   o:["Être le gérant majoritaire et détenir plus de 50 % du capital","Les dividendes ont été décidés en assemblée générale ET la société est française ou a son siège dans un pays de l'UE ou en accord fiscal avec la France","Le CA de la société est inférieur à 10 M€ et le capital est intégralement libéré","Il n'y a aucune condition particulière pour bénéficier de l'abattement de 40 %"],
   a:1,e:"L'abattement de 40 % (destiné à compenser la double imposition dividendes-IR) exige : (1) décision de distribution prise en assemblée générale ET (2) société distributrice établie en France, en UE ou dans un État ayant conclu avec la France un accord d'élimination des doubles impositions."},

  {id:59,t:"sc",d:"m",
   q:"Lors de la rédaction des statuts, les associés d'une SAS se demandent quelle durée maximale légale ils peuvent prévoir pour leur société. Quelle est cette durée limite ?",
   o:["50 ans non renouvelables","75 ans renouvelables une fois","99 ans, renouvelables indéfiniment","La durée est illimitée par défaut"],
   a:2,e:"La durée de vie d'une société est librement fixée par les associés dans les statuts, mais ne peut dépasser 99 ans. À l'expiration, les associés peuvent voter la prorogation pour une nouvelle période. La plupart des statuts prévoient 99 ans."},

  {id:60,t:"sc",d:"m",
   q:"Lors de la création d'une société, un associé apporte un fonds de commerce évalué à 25 000 € et des équipements valant 8 000 €, soit 33 000 € d'apports en nature au total pour un capital de 50 000 €. Un commissaire aux apports est-il obligatoire pour évaluer ces apports ?",
   o:["Non, un commissaire aux apports n'est jamais obligatoire pour les apports en nature","Oui, car chaque apport en nature est obligatoirement évalué par un commissaire aux apports","Oui, car le fonds de commerce dépasse 30 000 € OU parce que le total des apports en nature dépasse 50 % du capital social","Non, les associés peuvent toujours évaluer librement leurs apports en nature"],
   a:2,e:"Le commissaire aux apports est obligatoire dès lors qu'un apport en nature unitaire dépasse 30 000 € (le fonds de commerce à 25 000 € est inférieur), OU que la valeur totale des apports en nature dépasse 50 % du capital. Ici, 33 000 € > 50 % × 50 000 € = 25 000 € → commissaire obligatoire."},
];

const DES_Q=[
  {id:101,t:"da",d:"f",
   q:"Un étudiant en design crée une affiche originale pour son portfolio. Son professeur lui explique que cette création est déjà protégée. Quelle condition essentielle cette affiche doit-elle remplir pour bénéficier de la protection du droit d'auteur ?",
   o:["Elle doit avoir été déposée préalablement à l'INPI ou auprès d'une société d'auteurs","Elle doit être originale, c'est-à-dire porter l'empreinte de la personnalité de son auteur","Elle doit avoir fait l'objet d'une publication commerciale ou d'une exposition publique","Elle doit avoir été créée dans le cadre d'un contrat de commande ou d'une mission professionnelle"],
   a:1,e:"Le droit d'auteur protège automatiquement toute oeuvre originale dès sa création, sans dépôt ni formalité préalable. L'originalité signifie que l'oeuvre porte l'empreinte de la personnalité de l'auteur, reflet de ses choix créatifs propres."},

  {id:102,t:"da",d:"f",
   q:"Un designer freelance crée une identité visuelle pour un client. À partir de quel moment cette création est-elle protégée par le droit d'auteur en droit français ?",
   o:["À partir du moment où elle est déposée à l'INPI ou enregistrée officiellement","Dès le moment de sa livraison au client et du paiement de la facture","Dès l'instant de sa création, automatiquement et sans aucune formalité requise","À compter de sa première publication ou diffusion au public"],
   a:2,e:"En droit français, la protection par le droit d'auteur est automatique et naît dès la création de l'oeuvre, sans aucune formalité requise (pas de dépôt, pas d'enregistrement). C'est une différence fondamentale avec le droit des marques ou des brevets qui exigent un dépôt."},

  {id:103,t:"da",d:"f",
   q:"L'illustratrice Sophie décède en laissant une oeuvre considérable. Pendant combien de temps à compter de son décès ses héritiers bénéficieront-ils de la protection du droit d'auteur sur son oeuvre ?",
   o:["50 ans après son décès, conformément aux conventions internationales","70 ans après son décès, délai à l'issue duquel l'oeuvre tombe dans le domaine public","99 ans à compter de la date de création de chaque oeuvre","La protection est perpétuelle et les héritiers en jouissent indéfiniment"],
   a:1,e:"En France et dans l'Union européenne, le droit d'auteur est protégé pendant 70 ans après la mort de l'auteur. À l'issue de ce délai, l'oeuvre tombe dans le domaine public et peut être librement utilisée, sous réserve du respect permanent des droits moraux."},

  {id:104,t:"da",d:"f",
   q:"Un directeur artistique dont l'oeuvre a été modifiée sans son accord par un client invoque ses droits moraux d'auteur. Parmi les propositions suivantes, laquelle décrit le mieux la nature des droits moraux ?",
   o:["Les droits moraux sont des droits patrimoniaux qui permettent à l'auteur de percevoir une rémunération pour l'exploitation de son oeuvre","Les droits moraux sont des droits perpétuels et inaliénables de l'auteur sur son oeuvre, comprenant notamment le droit à la paternité, à l'intégrité, à la divulgation et au repentir","Les droits moraux sont des droits cessibles qui peuvent être transférés à une société d'édition par contrat","Les droits moraux s'éteignent au moment du décès de l'auteur, à la différence des droits patrimoniaux"],
   a:1,e:"Les droits moraux (paternité, intégrité, divulgation, retrait/repentir) sont perpétuels, inaliénables et imprescriptibles. Contrairement aux droits patrimoniaux (reproduction, représentation), ils ne peuvent jamais être cédés ou abandonnés, même contractuellement."},

  {id:105,t:"da",d:"f",
   q:"Un éditeur propose à un auteur illustrateur d'inclure dans leur contrat une clause par laquelle l'auteur renonce à son droit moral sur les illustrations qu'il créera. Cette clause est-elle juridiquement valide ?",
   o:["Oui, si l'auteur la signe librement et reçoit une compensation financière suffisante","Oui, à condition que la renonciation soit limitée dans le temps et précisément décrite","Non, les droits moraux sont inaliénables et aucune clause contractuelle ne peut y déroger","Non, mais l'auteur peut accepter de ne pas exercer ses droits moraux de façon tacite"],
   a:2,e:"Les droits moraux sont inaliénables au sens strict du terme : aucun contrat, aucune clause, aucune transaction ne peut priver l'auteur de ses droits moraux. Toute renonciation contractuelle aux droits moraux est réputée non écrite. C'est un principe fondamental du droit d'auteur français."},

  {id:106,t:"da",d:"m",
   q:"Un photographe freelance cède à un magazine le droit de reproduire ses photos dans son édition papier mensuelle. En quoi consiste précisément le droit de reproduction qu'il cède ?",
   o:["Le droit d'obtenir des copies physiques de ses tirages originaux","Le droit exclusif d'autoriser toute fixation matérielle de son oeuvre sur n'importe quel support : impression papier, format numérique, affichage, etc.","Le droit de représenter ses oeuvres lors d'expositions ou d'événements publics","Le droit de modifier et d'adapter ses photographies selon les besoins éditoriaux"],
   a:1,e:"Le droit de reproduction est le droit exclusif d'autoriser toute fixation matérielle de l'oeuvre sur un support (impression, numérisation, diffusion en ligne, etc.). C'est un droit patrimonial cessible. Il est distinct du droit de représentation (communication au public) et du droit de suite."},

  {id:107,t:"da",d:"m",
   q:"Une marque de mode commande à un graphiste la création complète de son identité visuelle (logo, charte graphique, packaging) et le rémunère généreusement. Qui est titulaire des droits d'auteur sur ces créations, en l'absence de tout contrat de cession ?",
   o:["La marque, car elle a financé et commandé les créations","Le graphiste freelance, qui conserve ses droits d'auteur en l'absence de cession contractuelle expresse","Les deux parties à égalité, dans le cadre d'une co-création reconnue par la loi","L'INPI, en tant qu'organisme dépositaire de la propriété intellectuelle"],
   a:1,e:"Dans une oeuvre de commande, le créateur freelance reste titulaire de ses droits d'auteur. Le paiement de la prestation ne transfère PAS automatiquement les droits. Le client ne dispose que d'une licence implicite pour l'usage convenu. Toute cession doit être expressément stipulée par écrit dans un contrat."},

  {id:108,t:"da",d:"m",
   q:"Trois artistes décident de créer ensemble une installation multimédia originale, chacun contribuant à une partie différente de l'oeuvre. Cette collaboration donne naissance à quel type d'oeuvre, avec quelles conséquences pour la gestion des droits ?",
   o:["Une oeuvre collective placée sous le contrôle exclusif de l'initiateur du projet","Une oeuvre de collaboration créée conjointement, dont les droits sont gérés en indivision et les décisions d'exploitation prises à l'unanimité","Trois oeuvres individuelles autonomes, chaque artiste restant seul maître de sa contribution","Une oeuvre anonyme dont les droits appartiennent à la collectivité"],
   a:1,e:"L'oeuvre de collaboration est créée par la participation créative de plusieurs auteurs. Les droits sont en indivision entre les co-auteurs. Les décisions d'exploitation de l'oeuvre commune (cession, licence…) doivent être prises à l'unanimité des co-auteurs."},

  {id:109,t:"da",d:"m",
   q:"Un journaliste cite plusieurs extraits d'un roman récemment publié dans sa critique littéraire parue dans un magazine. L'auteur du roman peut-il lui reprocher une atteinte à ses droits d'auteur ?",
   o:["Oui, toute reproduction d'extraits d'une oeuvre protégée requiert l'autorisation préalable et écrite de l'auteur","Non, la loi prévoit une exception de courte citation à des fins d'analyse ou de critique, à condition de mentionner l'auteur et la source","Non, dès lors que la critique est bienveillante et ne nuit pas à la réputation de l'auteur","Non, les oeuvres publiées commercialement peuvent être citées librement sans restriction"],
   a:1,e:"L'exception de courte citation permet de reproduire un extrait d'une oeuvre protégée sans autorisation, à des fins d'analyse, de critique, d'enseignement ou d'information, sous deux conditions : la citation doit être courte et la source (auteur, titre) doit être clairement mentionnée."},

  {id:110,t:"da",d:"m",
   q:"Un sculpteur dont une oeuvre a été revendue aux enchères pour 50 000 € peut-il prétendre à une part du produit de cette revente ? Sur quel principe ce droit repose-t-il ?",
   o:["Non, une fois l'oeuvre vendue, l'artiste n'a aucun droit sur les reventes ultérieures","Oui, grâce au droit de suite, qui lui permet de percevoir un pourcentage du prix de revente aux enchères publiques de ses oeuvres originales","Oui, mais uniquement si l'oeuvre est revendue à une institution publique ou un musée","Non, ce droit n'existe qu'en cas de revente entre particuliers, pas aux enchères"],
   a:1,e:"Le droit de suite est un droit inaliénable qui permet à l'artiste-auteur de percevoir un pourcentage (entre 0,25 % et 4 % selon les tranches) sur le prix de revente de ses oeuvres originales lors de ventes aux enchères publiques. Il bénéficie également aux héritiers pendant 70 ans."},

  {id:111,t:"da",d:"h",
   q:"Paul est salarié dans une agence de publicité et crée, dans le cadre de sa mission, un logiciel de retouche d'images et un logo pour un client de l'agence. Concernant ces deux créations, qui est titulaire des droits d'auteur respectifs ?",
   o:["L'agence est automatiquement titulaire des droits sur les deux créations, car elles ont été réalisées dans le cadre du contrat de travail","Pour le logiciel : l'employeur de plein droit par la loi. Pour le logo : le salarié Paul, sauf clause de cession dans son contrat de travail","Paul est titulaire des droits sur les deux créations, le contrat de travail ne transfère aucun droit d'auteur","L'agence est propriétaire du logo, Paul du logiciel"],
   a:1,e:"C'est une subtilité importante : pour les LOGICIELS créés par un salarié dans l'exercice de ses fonctions, les droits d'auteur patrimoniaux sont automatiquement dévolus à l'employeur. Pour les AUTRES oeuvres (logo, illustrations, etc.), le salarié reste titulaire des droits : seule une clause expresse de cession dans le contrat peut transférer ces droits à l'employeur."},

  {id:112,t:"da",d:"h",
   q:"Un groupe de presse lance une encyclopédie numérique et coordonne le travail de dizaines de rédacteurs et illustrateurs. Le groupe publie l'encyclopédie sous son propre nom. Quel type d'oeuvre cela constitue-t-il, et qui en détient les droits ?",
   o:["Une oeuvre de collaboration dont les droits appartiennent à l'ensemble des contributeurs","Une oeuvre collective créée sous la direction et le nom du groupe de presse, qui en est titulaire des droits comme une personne morale","Une oeuvre anonyme dont les droits appartiennent au domaine public après 25 ans","Une oeuvre composite dont les droits restent partagés entre le groupe et chaque contributeur"],
   a:1,e:"L'oeuvre collective est créée à l'initiative et sous la direction d'une personne (physique ou morale) qui l'édite, la publie et la divulgue sous son nom. La contribution des participants se fond dans l'ensemble sans qu'il soit possible d'attribuer à chacun un droit distinct. La personne morale (ici le groupe de presse) est titulaire des droits. Ex : encyclopédies, journaux, sites web d'entreprises."},

  {id:113,t:"da",d:"h",
   q:"Un designer a créé une affiche pour un festival de musique. Le contrat prévoit son utilisation pour la communication de l'édition 2024. L'organisateur l'utilise ensuite pour un documentaire sur le festival, sans nouvelles négociations. Le designer peut-il s'y opposer ?",
   o:["Non, car le paiement initial couvre toutes les utilisations futures de l'oeuvre","Oui, car le principe de spécialité des droits d'auteur stipule que la cession ne couvre que les droits et usages expressément mentionnés : le documentaire n'étant pas prévu, il nécessite une nouvelle autorisation","Non, dès lors que l'oeuvre a été livrée et payée, elle peut être utilisée à des fins analogues","Oui, mais uniquement si le designer n'a pas renoncé à son droit moral par une clause contractuelle"],
   a:1,e:"Le principe de spécialité (art. L131-3 CPI) est fondamental : toute cession de droits doit préciser les droits cédés, la durée, le territoire et les modes d'exploitation autorisés. Tout usage non expressément prévu dans le contrat reste propriété de l'auteur et nécessite une nouvelle autorisation et une nouvelle rémunération."},

  {id:114,t:"da",d:"m",
   q:"Une créatrice souhaite utiliser librement et gratuitement les affiches de l'affichiste Cassandre pour une exposition. Ces oeuvres sont-elles dans le domaine public, et que reste-t-il à respecter même si la protection patrimoniale est expirée ?",
   o:["Oui, toutes les oeuvres antérieures à 1950 sont librement utilisables sans restriction","Oui, si 70 ans se sont écoulés depuis la mort de l'auteur, les oeuvres peuvent être librement reproduites, mais les droits moraux (paternité, intégrité) demeurent perpétuels","Non, le domaine public n'existe pas en France, toutes les oeuvres restent protégées indéfiniment","Oui, une fois dans le domaine public, aucun droit n'est plus opposable à personne"],
   a:1,e:"Une oeuvre entre dans le domaine public 70 ans après la mort de l'auteur : elle devient librement utilisable sans autorisation ni rémunération. Cependant, les droits moraux (droit à la paternité = citer le nom de l'auteur, droit à l'intégrité = ne pas déformer l'oeuvre) restent perpétuels et doivent toujours être respectés."},

  {id:115,t:"da",d:"m",
   q:"Un artiste plasticien détourne de manière satirique et humoristique une affiche de campagne électorale d'un parti politique. Cet usage non autorisé est-il couvert par une exception légale ?",
   o:["Non, tout usage satirique d'une oeuvre protégée requiert l'autorisation préalable de son auteur","Oui, l'exception de parodie permet ce type de détournement à condition que la parodie soit clairement reconnaissable comme telle et ne soit pas confondue avec l'oeuvre originale","Oui, toute oeuvre politique ou de communication institutionnelle est librement parodiable","Non, sauf si l'usage est strictement non commercial et n'est pas diffusé publiquement"],
   a:1,e:"L'exception de parodie, pastel ou caricature (art. L122-5 CPI) permet un détournement d'oeuvre protégée sans autorisation, à deux conditions : la parodie doit être clairement reconnaissable comme telle (pas de confusion avec l'original) et elle ne doit pas porter une atteinte injustifiée aux intérêts légitimes de l'auteur."},

  {id:116,t:"ma",d:"f",
   q:"Une agence de design dépose une marque à l'INPI pour son logo et sa dénomination sociale. Quelle est la durée de protection initiale de cette marque, et comment cette protection peut-elle être maintenue dans le temps ?",
   o:["5 ans, renouvelables par tranches de 5 ans indéfiniment","10 ans à compter de la date du dépôt, renouvelables indéfiniment par tranches de 10 ans moyennant paiement des redevances","20 ans non renouvelables, comme un brevet d'invention","70 ans après le décès du fondateur de l'agence, comme le droit d'auteur"],
   a:1,e:"Une marque déposée à l'INPI est protégée pendant 10 ans à compter de la date de dépôt. Cette protection peut être renouvelée indéfiniment par périodes de 10 ans, à condition de payer les redevances de renouvellement et d'exploiter effectivement la marque."},

  {id:117,t:"ma",d:"f",
   q:"Un studio de design souhaite déposer le nom et le logo de sa nouvelle identité de marque en France. Auprès de quelle organisation nationale doit-il effectuer ce dépôt, et quelle organisation équivalente couvre l'ensemble des pays de l'UE ?",
   o:["La Chambre de Commerce et d'Industrie pour la France / la BCE pour l'Europe","L'INPI (Institut National de la Propriété Industrielle) pour la France / l'EUIPO pour les marques de l'Union européenne","Le greffe du tribunal de commerce pour la France / le Parlement européen pour l'Europe","La DGCCRF pour la France / Interpol pour les droits internationaux"],
   a:1,e:"En France, les marques, brevets, dessins et modèles sont déposés à l'INPI. Pour une protection dans les 27 États membres de l'UE en une seule démarche, le dépôt se fait auprès de l'EUIPO (Office de l'UE pour la Propriété Intellectuelle), basé à Alicante en Espagne."},

  {id:118,t:"ma",d:"f",
   q:"Un créateur souhaite déposer la marque \"Eau Fraîche\" pour commercialiser une nouvelle eau minérale. L'INPI peut-il refuser cet enregistrement ? Sur quel fondement ?",
   o:["Non, tout signe peut être déposé comme marque dès lors qu'il est original et inédit","Oui, car un signe purement descriptif des caractéristiques du produit ne peut constituer une marque valide — il doit être distinctif","Oui, mais uniquement si une marque identique existe déjà dans la même classe","Non, seuls les signes contraires à l'ordre public peuvent être refusés"],
   a:1,e:"Une marque valide doit être DISTINCTIVE : elle ne doit pas décrire directement la nature, la qualité ou les caractéristiques du produit. \"Eau Fraîche\" est descriptif pour une eau minérale → refus. En revanche, \"Evian\" ou \"Badoit\" sont distinctifs car ils n'évoquent pas directement les propriétés du produit."},

  {id:119,t:"ma",d:"m",
   q:"Une marque de vêtements de sport est déposée dans la classe 25 (habillement) du classement de Nice. Un concurrent lance une gamme d'équipements sportifs en utilisant exactement le même nom dans la classe 28 (jeux et jouets). La première marque peut-elle s'y opposer ?",
   o:["Oui, car une marque protège son titulaire contre tout usage de signes identiques ou similaires, dans toutes les classes","Non, sauf si la marque est notoire : en vertu du principe de spécialité, la protection d'une marque ordinaire ne vaut que pour les classes où elle a été enregistrée","Oui, car les classes 25 et 28 sont proches et créent un risque de confusion","Non, chaque classe constitue une protection totalement indépendante, sans possibilité d'action croisée"],
   a:1,e:"Le principe de spécialité est fondamental en droit des marques : la protection ne vaut que pour les classes de produits/services expressément désignées lors du dépôt (parmi les 45 classes du classement de Nice). Exception : les marques notoires (Apple, Nike) bénéficient d'une protection élargie hors de leurs classes."},

  {id:120,t:"ma",d:"m",
   q:"Une marque déposée à l'INPI n'a pas été exploitée commercialement depuis 6 ans par son titulaire. Un concurrent souhaite s'en emparer. Quelle procédure peut-il engager et quand ?",
   o:["Il peut demander la déchéance de la marque dès lors qu'elle n'a pas été exploitée pendant 5 ans consécutifs sans juste motif","Il peut simplement déposer la même marque, l'ancienneté de la marque abandonnée n'étant plus opposable après 3 ans","Il peut demander l'annulation de la marque pour defaut d'originalité","Il ne peut rien faire, le titulaire de la marque reste propriétaire même sans exploitation"],
   a:0,e:"La déchéance pour non-usage : toute personne intéressée peut demander en justice la déchéance des droits du titulaire si la marque n'a pas fait l'objet d'un usage sérieux pendant une période continue de 5 ans, sans juste motif. C'est une sanction de l'abandon de marque."},

  {id:121,t:"ma",d:"m",
   q:"Une start-up française en forte croissance souhaite protéger sa marque dans toute l'Europe. Plutôt que de déposer la marque dans chacun des 27 États membres séparément, quelle solution lui permettrait de le faire en une seule démarche ?",
   o:["Déposer la marque à l'INPI en France puis activer une extension automatique UE","Déposer une marque de l'Union européenne (UE) directement auprès de l'EUIPO à Alicante — protection immédiate dans les 27 États membres","Déposer via l'OMPI une demande internationale désignant tous les pays européens","Il n'existe pas de procédure unifiée : chaque pays requiert un dépôt national séparé"],
   a:1,e:"La marque de l'Union européenne (MUE) est déposée directement auprès de l'EUIPO (Office de l'UE pour la Propriété Intellectuelle, basé à Alicante). Un seul dépôt confère une protection uniforme dans les 27 États membres de l'UE, pour une durée de 10 ans renouvelables."},

  {id:122,t:"ma",d:"m",
   q:"Un designer créatif conçoit pour son client un logo dont la forme et les couleurs ressemblent fortement à une marque déposée active dans le même secteur. Quels risques juridiques encourt concrètement ce designer ou son client ?",
   o:["Aucun risque si les logos ne sont pas strictement identiques — seule l'identité totale est sanctionnée","Le titulaire de la marque déposée peut engager une action en contrefaçon ou en concurrence déloyale, pouvant mener à des dommages et intérêts et une interdiction d'usage","Seule une amende administrative de l'INPI peut être prononcée dans ce cas","Le risque est limité à un simple avertissement du titulaire de la marque, sans suite judiciaire possible"],
   a:1,e:"La contrefaçon de marque couvre non seulement la reproduction à l'identique, mais aussi l'imitation d'une marque déposée créant un risque de confusion dans l'esprit du public. Il est donc indispensable pour tout designer de rechercher les antériorités (via l'INPI ou l'EUIPO) avant de créer un logo pour un client."},

  {id:123,t:"ma",d:"h",
   q:"Un studio crée un logo original pour une entreprise cliente. Le directeur créatif pense protéger ce logo à la fois par le droit d'auteur et par le dépôt d'une marque. Ces deux protections sont-elles compatibles ? Quelles différences les distinguent ?",
   o:["Elles sont incompatibles : on ne peut protéger un logo que par l'une ou l'autre des voies, jamais les deux simultanément","Elles sont cumulables et complémentaires : droit d'auteur (automatique, 70 ans post-mortem, originalité requise) et marque (dépôt obligatoire, 10 ans renouvelables, distinctivité requise, protection par classe sectorielle)","Elles sont identiques dans leurs conditions d'acquisition et leurs effets","Le droit d'auteur s'applique au dessin du logo, la marque s'applique uniquement au texte associé"],
   a:1,e:"Un logo peut cumuler les deux protections : droit d'auteur (automatique dès création si original, 70 ans post-mortem) + marque déposée (dépôt INPI/EUIPO obligatoire, 10 ans renouvelables, protection par classes sectorielles, distinctivité requise). Cette double protection est recommandée car elles couvrent des aspects complémentaires."},

  {id:124,t:"ma",d:"h",
   q:"La marque \"Chanel\" est utilisée par une petite entreprise artisanale pour commercialiser des bougies parfumées — produit très éloigné du secteur de la mode et du luxe. La maison Chanel peut-elle s'y opposer malgré la règle de spécialité des marques ?",
   o:["Non, le principe de spécialité s'applique strictement : Chanel n'est pas déposée dans la classe des bougies","Oui, car \"Chanel\" est une marque notoire connue d'une large fraction du public, ce qui lui confère une protection étendue bien au-delà de ses classes d'enregistrement","Non, Chanel devrait d'abord déposer sa marque dans la classe des bougies","Oui, mais uniquement si l'usage de la marque est malveillant ou crée une confusion directe"],
   a:1,e:"Les marques notoires (reconnues par une large fraction du public, ex. Chanel, Apple, Nike, Hermès) bénéficient d'une protection élargie hors de leurs classes d'enregistrement. Cette protection renforcée vise à éviter la dilution de la marque ou le parasitisme, même dans des secteurs très différents."},

  {id:125,t:"dm",d:"f",
   q:"Une étudiante en design industriel crée un nouveau modèle de chaise caractérisé par une forme organique distinctive, des couleurs spécifiques et une texture de surface reconnaissable. Qu'est-ce qu'un dessin ou modèle au sens du droit de la propriété industrielle ?",
   o:["Un plan technique détaillé décrivant le fonctionnement d'un mécanisme ou d'un procédé industriel","L'apparence visuelle et esthétique extérieure d'un produit, caractérisée par ses lignes, couleurs, formes, textures, matériaux ou ornements","Une illustration ou oeuvre graphique destinée à être reproduite en série sur des supports imprimés","Un logotype ou une marque figurative identifiant l'entreprise productrice"],
   a:1,e:"Un dessin ou modèle protège l'APPARENCE VISUELLE EXTÉRIEURE d'un produit (et non sa fonction ou son procédé technique, qui relève du brevet). Il couvre les lignes, contours, couleurs, formes, textures, matériaux et ornements. Exemples : meuble, emballage, vêtement, interface utilisateur, motif textile."},

  {id:126,t:"dm",d:"f",
   q:"Un designer dépose un dessin ou modèle à l'INPI pour protéger l'apparence d'un nouveau produit. Quelle est la durée maximale de protection que cette démarche peut lui offrir ?",
   o:["10 ans non renouvelables","20 ans maximum, renouvelable par tranches de 5 ans","25 ans maximum, par périodes de 5 ans renouvelables 4 fois","70 ans après le décès du créateur, comme le droit d'auteur"],
   a:2,e:"La protection par dessin ou modèle déposé dure 5 ans à compter du dépôt, renouvelable 4 fois par périodes de 5 ans, soit une durée maximale de 25 ans. Au-delà, le design entre dans le domaine public et peut être librement copié."},

  {id:127,t:"dm",d:"m",
   q:"Un créateur souhaite déposer son dessin ou modèle pour bénéficier de la protection juridique maximale. Quelles sont les deux conditions cumulatives que son design doit satisfaire pour être protégeable ?",
   o:["Originalité (empreinte de la personnalité du créateur) et ancienneté (design existant depuis au moins 1 an)","Nouveauté (aucun design identique n'a été antérieurement divulgué) et caractère propre (l'impression visuelle globale diffère de celle des designs antérieurs sur l'utilisateur averti)","Dépôt préalable et paiement intégral des redevances de protection","Utilisation commerciale effective du design et publication dans un catalogue professionnel"],
   a:1,e:"Pour être protégeable par dépôt : (1) NOUVEAUTÉ : aucun design identique n'a été divulgué avant la date du dépôt ou de priorité ; (2) CARACTÈRE PROPRE : l'impression visuelle globale produite sur l'utilisateur averti diffère de celle de tout design antérieur. Ces deux conditions sont cumulatives."},

  {id:128,t:"dm",d:"m",
   q:"Un studio de design présente un nouveau concept de montre-bracelet lors d'un salon professionnel en octobre 2024, sans avoir encore déposé de dessin ou modèle. Une protection automatique existe-t-elle, et pour quelle durée ?",
   o:["Non, sans dépôt préalable, aucune protection n'existe pour les dessins et modèles en Europe","Oui, le design bénéficie d'une protection automatique de 3 ans en tant que dessin ou modèle communautaire non enregistré (DMCNE), dès la première divulgation publique sur le territoire de l'UE","Oui, une protection de 5 ans est accordée automatiquement pour tout design divulgué dans un salon professionnel","Non, mais la date du salon constitue une preuve de priorité pour le dépôt ultérieur"],
   a:1,e:"Le Dessin ou Modèle Communautaire Non Enregistré (DMCNE) offre une protection automatique de 3 ans dès la première divulgation publique dans l'UE. Cette protection est cependant limitée aux actes de copie intentionnelle — contrairement au design enregistré qui protège même contre les créations indépendantes similaires."},

  {id:129,t:"dm",d:"m",
   q:"Un designer présente son concept de luminaire lors d'un salon international en mars 2025. Ayant oublié de déposer son dessin ou modèle avant, peut-il encore le faire après le salon sans que la protection soit compromise par cette divulgation ?",
   o:["Non, toute divulgation publique préalable au dépôt détruit irrémédiablement la nouveauté du design et empêche toute protection","Oui, les salons professionnels sont confidentiels par nature et la divulgation n'est pas opposable","Oui, un délai de grâce de 12 mois s'applique en Europe : la divulgation par le créateur lui-même dans l'année précédant le dépôt ne détruit pas la nouveauté","Oui, si aucun concurrent n'a photographié ni copié le design lors du salon"],
   a:2,e:"La réglementation européenne sur les dessins et modèles prévoit un délai de grâce de 12 mois : la divulgation réalisée par le créateur lui-même (ou avec son accord) dans les 12 mois précédant la date de dépôt ne peut pas lui être opposée pour invoquer l'absence de nouveauté. Ce délai protège les créateurs qui présentent leurs travaux avant de les déposer."},

  {id:130,t:"dm",d:"h",
   q:"Un objet de design (lampe, meuble, accessoire) peut-il être protégé simultanément par le droit d'auteur et par le dépôt de dessin ou modèle ? En quoi ces deux protections se distinguent-elles et se complètent-elles ?",
   o:["Non, le droit français interdit le cumul des protections pour un même objet : il faut choisir l'une ou l'autre","Oui, le principe de l'unité de l'art permet ce cumul : droit d'auteur (automatique, originalité, 70 ans post-mortem) + dessin/modèle déposé (nouveauté + caractère propre, 25 ans max). Les conditions et la durée de protection diffèrent.","Oui, mais le droit d'auteur ne protège que la fonction esthétique, le dessin/modèle protège la forme industrielle","Non, seul le dessin ou modèle peut protéger les créations ayant une application industrielle"],
   a:1,e:"En France, la théorie de l'unité de l'art (L. 112-1 CPI) permet le cumul des protections. Droit d'auteur : automatique, condition d'originalité, 70 ans post-mortem. Dessin/modèle : dépôt obligatoire, conditions de nouveauté + caractère propre, 25 ans max. Un même objet peut bénéficier des deux protections, qui se complètent dans leurs conditions et leur durée."},

  {id:131,t:"ct",d:"f",
   q:"Une illustratrice signe avec un éditeur un contrat aux termes duquel elle transfère définitivement à ce dernier ses droits de reproduction et de distribution sur ses illustrations. De quel type d'acte juridique s'agit-il ?",
